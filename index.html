<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm Quest</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0fdfa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .rhythm-symbol { font-size: 3rem; margin: 0 0.25rem; }
        .track-bg { background-image: repeating-linear-gradient(45deg, #e5e7eb 25%, transparent 25%, transparent 75%, #e5e7eb 75%, #e5e7eb), repeating-linear-gradient(45deg, #e5e7eb 25%, #ffffff 25%, #ffffff 75%, #e5e7eb 75%, #e5e7eb); background-position: 0 0, 10px 10px; background-size: 20px 20px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Saved locally, bypassing need to re-enter!
        const getLocalKey = () => localStorage.getItem('rq_api_key') || '';
        const getLocalModel = () => localStorage.getItem('rq_model') || 'gemini-1.5-flash';

        const TEAMS = [
            { id: 'flutes', name: 'Flutes', color: 'bg-blue-400', border: 'border-blue-600', icon: 'fa-wind', count: 4 },
            { id: 'clarinets', name: 'Clarinets', color: 'bg-teal-400', border: 'border-teal-600', icon: 'fa-water', count: 7 },
            { id: 'saxophones', name: 'Saxophones', color: 'bg-yellow-400', border: 'border-yellow-600', icon: 'fa-fire', count: 4 },
            { id: 'trumpets', name: 'Trumpets', color: 'bg-orange-400', border: 'border-orange-600', icon: 'fa-bolt', count: 14 },
            { id: 'lowbrass', name: 'Low Brass', color: 'bg-red-400', border: 'border-red-600', icon: 'fa-mountain', count: 7 },
            { id: 'percussion', name: 'Percussion', color: 'bg-purple-400', border: 'border-purple-600', icon: 'fa-drum', count: 12 },
        ];

        const MAX_STEPS = 10;
        const MAX_FAILS = 4;

        const getShuffledTeams = () => {
            const indices = [0, 1, 2, 3, 4, 5];
            for (let i = indices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [indices[i], indices[j]] = [indices[j], indices[i]];
            }
            return indices;
        };

        const renderRhythmGroup = (group, index) => {
            const key = `group-${index}`;
            const fuzzyMatch = (arr) => group.length === arr.length && group.every((v, i) => Math.abs(v - arr[i]) < 0.01);

            if (fuzzyMatch([4.0])) return <span key={key} className="rhythm-symbol" title="4 beats">𝅝</span>;
            if (fuzzyMatch([2.0])) return <span key={key} className="rhythm-symbol" title="2 beats">𝅗𝅥</span>;
            if (fuzzyMatch([1.0])) return <span key={key} className="rhythm-symbol" title="1 beat">♩</span>;

            if (fuzzyMatch([0.5, 0.5])) return (
                <svg key={key} viewBox="0 0 50 80" className="w-12 h-20 inline-block mx-1 fill-current stroke-current">
                    <ellipse cx="12" cy="65" rx="7" ry="5" transform="rotate(-20 12 65)" />
                    <ellipse cx="38" cy="65" rx="7" ry="5" transform="rotate(-20 38 65)" />
                    <line x1="17" y1="65" x2="17" y2="20" strokeWidth="2" />
                    <line x1="43" y1="65" x2="43" y2="20" strokeWidth="2" />
                    <rect x="16" y="20" width="28" height="6" />
                </svg>
            );

            if (fuzzyMatch([0.25, 0.25, 0.25, 0.25])) return (
                <svg key={key} viewBox="0 0 100 80" className="w-24 h-20 inline-block mx-1 fill-current stroke-current">
                    {[12, 37, 62, 87].map((cx, i) => <ellipse key={'h'+i} cx={cx} cy="65" rx="7" ry="5" transform={`rotate(-20 ${cx} 65)`} />)}
                    {[17, 42, 67, 92].map((x, i) => <line key={'s'+i} x1={x} y1="65" x2={x} y2="20" strokeWidth="2" />)}
                    <rect x="16" y="20" width="77" height="6" />
                    <rect x="16" y="30" width="77" height="6" />
                </svg>
            );

            if (fuzzyMatch([0.5, 0.25, 0.25])) return (
                <svg key={key} viewBox="0 0 75 80" className="w-20 h-20 inline-block mx-1 fill-current stroke-current">
                    {[12, 42, 62].map((cx, i) => <ellipse key={'h'+i} cx={cx} cy="65" rx="7" ry="5" transform={`rotate(-20 ${cx} 65)`} />)}
                    {[17, 47, 67].map((x, i) => <line key={'s'+i} x1={x} y1="65" x2={x} y2="20" strokeWidth="2" />)}
                    <rect x="16" y="20" width="52" height="6" />
                    <rect x="46" y="30" width="22" height="6" />
                </svg>
            );

            if (fuzzyMatch([0.25, 0.25, 0.5])) return (
                <svg key={key} viewBox="0 0 75 80" className="w-20 h-20 inline-block mx-1 fill-current stroke-current">
                    {[12, 32, 62].map((cx, i) => <ellipse key={'h'+i} cx={cx} cy="65" rx="7" ry="5" transform={`rotate(-20 ${cx} 65)`} />)}
                    {[17, 37, 67].map((x, i) => <line key={'s'+i} x1={x} y1="65" x2={x} y2="20" strokeWidth="2" />)}
                    <rect x="16" y="20" width="52" height="6" />
                    <rect x="16" y="30" width="22" height="6" />
                </svg>
            );

            // 8th Note Triplets
            if (fuzzyMatch([1/3, 1/3, 1/3])) return (
                <svg key={key} viewBox="0 0 75 80" className="w-20 h-20 inline-block mx-1 fill-current stroke-current">
                    <text x="32" y="15" fontSize="14" fontWeight="bold">3</text>
                    {[12, 37, 62].map((cx, i) => <ellipse key={'h'+i} cx={cx} cy="65" rx="7" ry="5" transform={`rotate(-20 ${cx} 65)`} />)}
                    {[17, 42, 67].map((x, i) => <line key={'s'+i} x1={x} y1="65" x2={x} y2="25" strokeWidth="2" />)}
                    <rect x="16" y="25" width="52" height="6" />
                </svg>
            );

            // 16th Note Triplets
            if (fuzzyMatch([1/6, 1/6, 1/6, 0.5])) return (
                <svg key={key} viewBox="0 0 100 80" className="w-24 h-20 inline-block mx-1 fill-current stroke-current">
                    <text x="37" y="15" fontSize="14" fontWeight="bold">3</text>
                    {[12, 37, 62, 87].map((cx, i) => <ellipse key={'h'+i} cx={cx} cy="65" rx="7" ry="5" transform={`rotate(-20 ${cx} 65)`} />)}
                    {[17, 42, 67, 92].map((x, i) => <line key={'s'+i} x1={x} y1="65" x2={x} y2="25" strokeWidth="2" />)}
                    <rect x="16" y="25" width="77" height="6" />
                    <rect x="16" y="35" width="52" height="6" />
                </svg>
            );

            if (fuzzyMatch([0.5, 1/6, 1/6, 1/6])) return (
                <svg key={key} viewBox="0 0 100 80" className="w-24 h-20 inline-block mx-1 fill-current stroke-current">
                    <text x="62" y="15" fontSize="14" fontWeight="bold">3</text>
                    {[12, 37, 62, 87].map((cx, i) => <ellipse key={'h'+i} cx={cx} cy="65" rx="7" ry="5" transform={`rotate(-20 ${cx} 65)`} />)}
                    {[17, 42, 67, 92].map((x, i) => <line key={'s'+i} x1={x} y1="65" x2={x} y2="25" strokeWidth="2" />)}
                    <rect x="16" y="25" width="77" height="6" />
                    <rect x="41" y="35" width="52" height="6" />
                </svg>
            );

            return <span key={key} className="rhythm-symbol">?</span>;
        };

        const generateMeasure = (difficultyLevel = 0) => {
            const groups = [];
            // Level 9+ gets a grueling 2 measures (8 beats)!
            const totalBeats = difficultyLevel >= 8 ? 8.0 : 4.0; 
            let remaining = totalBeats;
            
            while(remaining > 0) {
                let availablePatterns = [];

                if (difficultyLevel <= 2) {
                    // Levels 1-3 (Positions 0-2): Whole, Half, Quarter ONLY
                    if (remaining >= 4.0) availablePatterns.push([4.0]);
                    if (remaining >= 2.0) availablePatterns.push([2.0]);
                    if (remaining >= 1.0) availablePatterns.push([1.0]);
                } else if (difficultyLevel <= 5) {
                    // Levels 4-6 (Positions 3-5): 8ths, 16ths, combos
                    if (remaining >= 1.0) {
                        availablePatterns.push([1.0]); // Keep quarters to connect things
                        availablePatterns.push([0.5, 0.5]);
                        availablePatterns.push([0.25, 0.25, 0.25, 0.25]);
                        availablePatterns.push([0.5, 0.25, 0.25]);
                        availablePatterns.push([0.25, 0.25, 0.5]);
                    }
                } else {
                    // Levels 7-9 (Positions 6+): Triplets and advanced syncopation
                    if (remaining >= 1.0) {
                        availablePatterns.push([1.0]);
                        availablePatterns.push([0.5, 0.5]);
                        availablePatterns.push([0.25, 0.25, 0.25, 0.25]);
                        availablePatterns.push([1/3, 1/3, 1/3]); // 8th note triplets
                        availablePatterns.push([1/6, 1/6, 1/6, 0.5]); // 16th note triplets
                        availablePatterns.push([0.5, 1/6, 1/6, 1/6]);
                    }
                }

                // Fallback for safety
                if (availablePatterns.length === 0) {
                    groups.push([1.0]);
                    remaining -= 1.0;
                    continue;
                }

                const p = availablePatterns[Math.floor(Math.random() * availablePatterns.length)];
                groups.push(p);
                
                const sum = p.reduce((a, b) => a + b, 0);
                remaining -= sum;
                // Fix JS floating point drift
                remaining = Math.round(remaining * 100) / 100;
            }
            return groups;
        };

        const App = () => {
            const [appView, setAppView] = React.useState('title');
            const [userApiKey, setUserApiKey] = React.useState(getLocalKey());
            const [selectedModel, setSelectedModel] = React.useState(getLocalModel());
            const [keyStatus, setKeyStatus] = React.useState('idle');
            
            const [positions, setPositions] = React.useState({ flutes: 0, clarinets: 0, saxophones: 0, trumpets: 0, lowbrass: 0, percussion: 0 });
            const [fails, setFails] = React.useState({ flutes: 0, clarinets: 0, saxophones: 0, trumpets: 0, lowbrass: 0, percussion: 0 });
            const [currentTeamIndex, setCurrentTeamIndex] = React.useState(0);
            const [stealingTeamIndex, setStealingTeamIndex] = React.useState(null);
            const [turnQueue, setTurnQueue] = React.useState([]);
            const [story, setStory] = React.useState("Welcome to Rhythm Quest! The magical Melody Chest awaits the first section to cross the musical realm.");
            const [currentRhythm, setCurrentRhythm] = React.useState([]);
            const [replaysLeft, setReplaysLeft] = React.useState(2);
            // gamePhases: start, playing, judging, steal_opportunity, judging_steal, gameover
            const [gamePhase, setGamePhase] = React.useState('start'); 
            const [winner, setWinner] = React.useState(null);
            const [showRhythm, setShowRhythm] = React.useState(false);
            const [audioCtx, setAudioCtx] = React.useState(null);

            const generateStoryText = (phase, team, targetTeam = null) => {
                if (phase === 'start') return `The quest begins! It is the ${team.name} section's turn. Listen and count the rhythm to pass!`;
                if (phase === 'pass') return `Glorious! The ${team.name} advanced! Now the ${targetTeam.name} must step up.`;
                if (phase === 'fail') return `Oh no! The ${team.name} stumbled on their rhythm!`;
                if (phase === 'steal_opportunity') return `The rhythm echoes! The ${targetTeam.name} have a chance to STEAL the point!`;
                if (phase === 'steal_pass') return `What a steal! The ${team.name} snatched a point! Now it's the ${targetTeam.name}'s regular turn.`;
                if (phase === 'steal_fail') return `Disaster! The ${team.name} failed their steal, losing a step and taking double damage! Now it's the ${targetTeam.name}'s regular turn.`;
                if (phase === 'gameover_win') return `Incredible! The ${team.name} have reached the Melody Chest! They are the supreme champions of Rhythm Quest!`;
                if (phase === 'gameover_tpk') return `A tragedy! Every single section has failed too many times. The Melody Chest remains sealed forever!`;
                return "The journey continues...";
            };

            const initAudio = () => {
                if (!audioCtx) {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    setAudioCtx(ctx);
                    return ctx;
                }
                return audioCtx;
            };

            const playNote = (ctx, time, duration, isCountIn = false) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (isCountIn) {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(1200, time);
                    osc.frequency.exponentialRampToValueAtTime(100, time + 0.1);

                    gain.gain.setValueAtTime(1, time);
                    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);

                    osc.start(time);
                    osc.stop(time + 0.1);
                } else {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(440, time);

                    const attack = 0.02;
                    const release = Math.min(0.05, duration * 0.2);

                    gain.gain.setValueAtTime(0, time);
                    gain.gain.linearRampToValueAtTime(0.8, time + attack);
                    gain.gain.setValueAtTime(0.8, time + duration - release);
                    gain.gain.linearRampToValueAtTime(0, time + duration);

                    osc.start(time);
                    osc.stop(time + duration);
                }
            };

            const playRhythmAudio = () => {
                if (replaysLeft <= 0 && gamePhase === 'playing') return;
                
                const ctx = initAudio();
                if (ctx.state === 'suspended') ctx.resume();

                const bpm = 75;
                const beatDuration = 60 / bpm;
                let startTime = ctx.currentTime + 0.2;

                // Count in
                for (let i = 0; i < 4; i++) {
                    playNote(ctx, startTime + i * beatDuration, 0, true);
                }

                startTime += 4 * beatDuration;

                // Play rhythm
                let currentOffset = 0;
                const flatRhythm = currentRhythm.flat();
                flatRhythm.forEach(noteDuration => {
                    const durationInSeconds = noteDuration * beatDuration;
                    const articulationGap = Math.min(0.05, durationInSeconds * 0.1); 
                    const playDuration = durationInSeconds - articulationGap;

                    playNote(ctx, startTime + currentOffset * beatDuration, playDuration, false);
                    currentOffset += noteDuration;
                });

                if (gamePhase === 'playing') {
                    setReplaysLeft(prev => prev - 1);
                    setGamePhase('judging');
                }
            };

            const testApiKey = async () => {
                if (!userApiKey.trim()) return;
                setKeyStatus('testing');
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${userApiKey}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "Reply with the word 'Success' if you can read this." }] }]
                        })
                    });
                    if (response.ok) {
                        setKeyStatus('success');
                        localStorage.setItem('rq_api_key', userApiKey);
                        localStorage.setItem('rq_model', selectedModel);
                    } else {
                        const errData = await response.json();
                        console.error("API Key Test Failed. Details:", errData);
                        setKeyStatus('error');
                    }
                } catch (error) {
                    console.error("API Key Request Error:", error);
                    setKeyStatus('error');
                }
            };

            const getNextAliveTeam = (currentFails, currentQueue) => {
                const activeIndices = TEAMS.map((_, i) => i).filter(i => currentFails[TEAMS[i].id] < MAX_FAILS);
                if (activeIndices.length === 0) return null;

                let nextQueue = currentQueue.filter(i => activeIndices.includes(i));
                if (nextQueue.length === 0) {
                    nextQueue = getShuffledTeams().filter(i => activeIndices.includes(i));
                }
                return { teamIdx: nextQueue[0], newQueue: nextQueue.slice(1) };
            };

            const startGame = () => {
                initAudio();
                const initialQueue = getShuffledTeams();
                setCurrentTeamIndex(initialQueue[0]);
                setTurnQueue(initialQueue.slice(1));
                setPositions({ flutes: 0, clarinets: 0, saxophones: 0, trumpets: 0, lowbrass: 0, percussion: 0 });
                setFails({ flutes: 0, clarinets: 0, saxophones: 0, trumpets: 0, lowbrass: 0, percussion: 0 });
                
                const initialRhythm = generateMeasure(0);
                setCurrentRhythm(initialRhythm);
                setReplaysLeft(2);
                setShowRhythm(false);
                setGamePhase('playing');
                setStory(generateStoryText('start', TEAMS[initialQueue[0]]));
            };

            const handleTurnAdvance = (newPositions, newFails, lastActionStory) => {
                const nextTarget = getNextAliveTeam(newFails, turnQueue);
                
                if (!nextTarget) {
                    setGamePhase('gameover');
                    setWinner(null);
                    setStory(generateStoryText('gameover_tpk'));
                    return;
                }

                setTurnQueue(nextTarget.newQueue);
                setCurrentTeamIndex(nextTarget.teamIdx);
                
                const nextDifficulty = newPositions[TEAMS[nextTarget.teamIdx].id];
                const nextRhythm = generateMeasure(nextDifficulty);
                setCurrentRhythm(nextRhythm);
                setReplaysLeft(2);
                setShowRhythm(false);
                setGamePhase('playing');
                setStory(lastActionStory);
            };

            const handleNormalResult = (passed) => {
                const currentTeam = TEAMS[currentTeamIndex];
                let newPositions = { ...positions };
                let newFails = { ...fails };

                if (passed) {
                    newPositions[currentTeam.id] += 1;
                    setPositions(newPositions);
                    if (newPositions[currentTeam.id] >= MAX_STEPS) {
                        setWinner(currentTeam);
                        setGamePhase('gameover');
                        setStory(generateStoryText('gameover_win', currentTeam));
                        return;
                    }
                    
                    const nextTarget = getNextAliveTeam(newFails, turnQueue);
                    if (nextTarget) {
                        handleTurnAdvance(newPositions, newFails, generateStoryText('pass', currentTeam, TEAMS[nextTarget.teamIdx]));
                    } else {
                        setGamePhase('gameover'); setWinner(null); setStory(generateStoryText('gameover_tpk'));
                    }
                } else {
                    newFails[currentTeam.id] += 1;
                    setFails(newFails);
                    
                    const nextTarget = getNextAliveTeam(newFails, turnQueue);
                    if (!nextTarget) {
                        setGamePhase('gameover');
                        setWinner(null);
                        setStory(generateStoryText('gameover_tpk'));
                        return;
                    }

                    // Go to steal phase
                    setStealingTeamIndex(nextTarget.teamIdx);
                    setGamePhase('steal_opportunity');
                    setStory(generateStoryText('steal_opportunity', currentTeam, TEAMS[nextTarget.teamIdx]));
                }
            };

            const handleStealDecision = (attemptSteal) => {
                if (attemptSteal) {
                    setGamePhase('judging_steal');
                } else {
                    // Passed on stealing. Normal advance.
                    handleTurnAdvance(positions, fails, `The ${TEAMS[stealingTeamIndex].name} declined to steal. It is now their regular turn!`);
                }
            };

            const handleStealResult = (stealSuccess) => {
                const stealingTeam = TEAMS[stealingTeamIndex];
                let newPositions = { ...positions };
                let newFails = { ...fails };

                if (stealSuccess) {
                    newPositions[stealingTeam.id] += 1;
                    setPositions(newPositions);
                    
                    if (newPositions[stealingTeam.id] >= MAX_STEPS) {
                        setWinner(stealingTeam);
                        setGamePhase('gameover');
                        setStory(generateStoryText('gameover_win', stealingTeam));
                        return;
                    }
                    
                    handleTurnAdvance(newPositions, newFails, generateStoryText('steal_pass', stealingTeam, TEAMS[stealingTeamIndex]));
                } else {
                    // Steal failed! -1 position (min 0), +2 fails!
                    newPositions[stealingTeam.id] = Math.max(0, newPositions[stealingTeam.id] - 1);
                    newFails[stealingTeam.id] += 2;
                    setPositions(newPositions);
                    setFails(newFails);

                    handleTurnAdvance(newPositions, newFails, generateStoryText('steal_fail', stealingTeam, TEAMS[stealingTeamIndex]));
                }
            };

            const renderTrack = () => {
                return (
                    <div className="bg-white p-6 rounded-2xl shadow-lg mb-6 border-4 border-emerald-900">
                        <h2 className="text-2xl font-bold text-center text-emerald-900 mb-6 uppercase tracking-widest">Quest Progress</h2>
                        <div className="space-y-4">
                            {TEAMS.map((team, idx) => {
                                const isEliminated = fails[team.id] >= MAX_FAILS;
                                const isCurrentTurn = currentTeamIndex === idx && (gamePhase === 'playing' || gamePhase === 'judging') && !isEliminated;
                                const isStealingTurn = stealingTeamIndex === idx && (gamePhase === 'steal_opportunity' || gamePhase === 'judging_steal') && !isEliminated;
                                
                                return (
                                <div key={team.id} className={`relative transition-opacity duration-500 ${isEliminated ? 'opacity-40 grayscale' : 'opacity-100'}`}>
                                    <div className="flex items-center mb-1">
                                        <div className={`w-40 font-bold flex flex-col justify-center ${isCurrentTurn ? 'text-emerald-700' : isStealingTurn ? 'text-amber-600' : 'text-gray-600'}`}>
                                            <div className={`text-lg flex items-center ${(isCurrentTurn || isStealingTurn) ? 'text-xl' : ''}`}>
                                                {isCurrentTurn && <i className="fa-solid fa-caret-right mr-2 text-emerald-500 animate-pulse"></i>}
                                                {isStealingTurn && <i className="fa-solid fa-mask mr-2 text-amber-500 animate-bounce"></i>}
                                                {team.name}
                                                <span className="ml-2 text-xs bg-gray-200 px-2 py-1 rounded-md">Lvl {Math.min(9, positions[team.id] + 1)}</span>
                                            </div>
                                            <div className="flex text-red-500 text-xs mt-1">
                                                {[...Array(MAX_FAILS)].map((_, i) => (
                                                    <i key={i} className={`fa-solid fa-xmark mr-1 ${i < fails[team.id] ? 'opacity-100' : 'opacity-20 text-gray-400'}`}></i>
                                                ))}
                                            </div>
                                            {isEliminated && <div className="text-red-700 text-xs font-black uppercase mt-1">Eliminated!</div>}
                                        </div>
                                        <div className="flex-1 h-12 bg-gray-200 rounded-full relative track-bg border-2 border-gray-300 overflow-hidden ml-2">
                                            <div className="absolute right-0 top-0 bottom-0 w-8 bg-yellow-400 border-l-4 border-yellow-600 flex items-center justify-center z-10">
                                                <i className="fa-solid fa-gem text-white text-xs"></i>
                                            </div>
                                            
                                            <div 
                                                className={`absolute top-0 bottom-0 transition-all duration-700 ease-in-out flex items-center justify-center z-20`}
                                                style={{ left: `${(positions[team.id] / MAX_STEPS) * 92}%`, width: '8%' }}
                                            >
                                                <div className={`w-10 h-10 ${team.color} ${team.border} border-2 rounded-full flex items-center justify-center shadow-md ${isCurrentTurn ? 'transform scale-125 ring-4 ring-emerald-300' : isStealingTurn ? 'transform scale-125 ring-4 ring-amber-400' : ''}`}>
                                                    <i className={`fa-solid ${team.icon} text-white`}></i>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            if (appView === 'title') {
                return (
                    <div className="min-h-screen bg-emerald-950 p-4 flex items-center justify-center relative overflow-hidden">
                        <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-emerald-800 rounded-full opacity-50 blur-3xl"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-teal-800 rounded-full opacity-50 blur-3xl"></div>
                        
                        <div className="bg-white p-10 md:p-14 rounded-3xl shadow-2xl max-w-xl w-full text-center border-4 border-emerald-500 relative z-10 transform transition-all hover:scale-[1.01]">
                            <h1 className="text-5xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-600 to-teal-500 mb-2 drop-shadow-sm">
                                Mr.A's Rhythm Quest
                            </h1>
                            <div className="text-gray-500 font-bold tracking-widest uppercase mb-6 text-xl flex items-center justify-center gap-3">
                                <span className="h-px w-8 bg-gray-300"></span>
                                Version 1.1
                                <span className="h-px w-8 bg-gray-300"></span>
                            </div>
                            
                            <div className="mb-8 text-left bg-gray-50 p-6 rounded-xl border border-gray-200 shadow-inner">
                                <div className="bg-blue-100 text-blue-800 p-4 rounded-lg mb-4 text-sm font-semibold border border-blue-200">
                                    <i className="fa-solid fa-bolt mr-2 text-blue-600"></i>
                                    Update: The AI Dungeon Master has been removed to ensure faster, flawless rhythm generation! The API Key is now strictly optional (saved locally if entered).
                                </div>

                                <label className="block text-gray-800 font-bold mb-3 text-lg">
                                    <i className="fa-solid fa-key mr-3 text-emerald-600"></i>
                                    Gemini API Key (Optional)
                                </label>
                                <input 
                                    type="password" 
                                    value={userApiKey} 
                                    onChange={(e) => { setUserApiKey(e.target.value); setKeyStatus('idle'); }}
                                    className="w-full px-5 py-4 rounded-xl border-2 border-gray-300 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100 focus:outline-none transition-all text-lg font-mono mb-4"
                                    placeholder="AIzaSy..."
                                />
                                
                                {userApiKey.trim() && (
                                    <>
                                        <label className="block text-gray-800 font-bold mb-3 text-lg">
                                            <i className="fa-solid fa-microchip mr-3 text-emerald-600"></i>
                                            Select Gemini Model
                                        </label>
                                        <select 
                                            value={selectedModel}
                                            onChange={(e) => { setSelectedModel(e.target.value); setKeyStatus('idle'); }}
                                            className="w-full px-5 py-4 rounded-xl border-2 border-gray-300 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100 focus:outline-none transition-all text-lg font-mono bg-white appearance-none"
                                        >
                                            <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
                                            <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                                            <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
                                            <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                                        </select>
                                    </>
                                )}
                            </div>

                            <div className="flex flex-col gap-4">
                                {userApiKey.trim() && (
                                    <button 
                                        onClick={testApiKey}
                                        disabled={keyStatus === 'testing'}
                                        className={`px-6 py-4 rounded-xl font-bold text-lg text-white shadow-md transition-all ${keyStatus === 'testing' ? 'bg-gray-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 hover:-translate-y-1'}`}
                                    >
                                        {keyStatus === 'testing' ? (
                                            <span><i className="fa-solid fa-spinner fa-spin mr-2"></i>Testing Magic...</span>
                                        ) : (
                                            <span><i className="fa-solid fa-wand-magic-sparkles mr-2"></i>Test Key & Save</span>
                                        )}
                                    </button>
                                )}

                                <div className="h-8 flex items-center justify-center">
                                    {keyStatus === 'success' && (
                                        <div className="text-green-600 font-bold animate-bounce text-lg">
                                            <i className="fa-solid fa-check-circle mr-2"></i> Key Verified & Saved Locally!
                                        </div>
                                    )}
                                    {keyStatus === 'error' && (
                                        <div className="text-red-600 font-bold text-lg">
                                            <i className="fa-solid fa-circle-exclamation mr-2"></i> Invalid Key or Model.
                                        </div>
                                    )}
                                </div>

                                <button 
                                    onClick={() => setAppView('game')}
                                    className={`mt-2 px-8 py-5 rounded-2xl font-black text-2xl shadow-xl transition-all bg-gradient-to-r from-emerald-500 to-teal-500 text-white hover:scale-105 hover:shadow-2xl`}
                                >
                                    Begin Quest <i className="fa-solid fa-arrow-right ml-2"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-5xl mx-auto flex flex-col">
                    <header className="text-center mb-8 relative">
                        <button onClick={() => setAppView('title')} className="absolute left-0 top-0 text-gray-500 hover:text-emerald-600 transition-colors" title="Back to Title">
                            <i className="fa-solid fa-arrow-left text-2xl"></i>
                        </button>
                        <h1 className="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-600 to-teal-500 drop-shadow-sm mb-2">
                            <i className="fa-solid fa-music mr-4 text-emerald-600"></i>
                            Rhythm Quest
                            <i className="fa-solid fa-scroll ml-4 text-teal-500"></i>
                        </h1>
                        <p className="text-gray-600 font-medium">A Musical Adventure for Band Sections</p>
                    </header>

                    {renderTrack()}

                    <div className="bg-white rounded-2xl shadow-xl overflow-hidden border-2 border-gray-100 flex-1 flex flex-col">
                        <div className="bg-emerald-900 p-4 text-white flex justify-between items-center">
                            <div className="font-bold text-xl flex items-center">
                                <i className="fa-solid fa-scroll mr-3 text-emerald-300"></i>
                                Encounter Log
                            </div>
                            {gamePhase !== 'start' && gamePhase !== 'gameover' && (
                                <div className={`px-4 py-1 rounded-full font-semibold border ${gamePhase.includes('steal') ? 'bg-amber-800 text-amber-200 border-amber-600' : 'bg-emerald-800 text-emerald-200 border-emerald-600'}`}>
                                    {gamePhase.includes('steal') ? (
                                        <>Steal Opportunity: {TEAMS[stealingTeamIndex].name}</>
                                    ) : (
                                        <>Current Turn: {TEAMS[currentTeamIndex].name} (Lvl {Math.min(9, positions[TEAMS[currentTeamIndex].id] + 1)})</>
                                    )}
                                </div>
                            )}
                        </div>
                        
                        <div className="p-8 flex-1 flex flex-col items-center justify-center text-center">
                            <p className="text-2xl font-serif text-gray-800 leading-relaxed mb-8 italic">"{story}"</p>

                            {gamePhase === 'start' && (
                                <button onClick={startGame} className="mt-4 px-10 py-4 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold rounded-full text-2xl shadow-lg transform transition hover:scale-105">
                                    Start Quest
                                </button>
                            )}

                            {gamePhase === 'gameover' && (
                                <div className="mt-8 animate-bounce">
                                    {winner ? (
                                        <h2 className="text-4xl font-black text-yellow-500 mb-4">
                                            <i className="fa-solid fa-trophy mr-4"></i>
                                            {winner.name} WIN!
                                            <i className="fa-solid fa-trophy ml-4"></i>
                                        </h2>
                                    ) : (
                                        <h2 className="text-4xl font-black text-red-600 mb-4">
                                            <i className="fa-solid fa-skull mr-4"></i>
                                            ALL PARTIES DEFEATED!
                                            <i className="fa-solid fa-skull ml-4"></i>
                                        </h2>
                                    )}
                                    <button onClick={() => window.location.reload()} className="px-6 py-3 bg-gray-800 hover:bg-gray-900 text-white font-bold rounded-full mt-4">
                                        Play Again
                                    </button>
                                </div>
                            )}

                            {(gamePhase === 'playing' || gamePhase === 'judging' || gamePhase === 'steal_opportunity' || gamePhase === 'judging_steal') && (
                                <div className="w-full max-w-3xl bg-gray-50 p-6 rounded-xl border-2 border-dashed border-gray-300">
                                    <h3 className="text-xl font-bold text-gray-700 mb-6 uppercase tracking-wider">Teacher Controls</h3>
                                    
                                    {(gamePhase === 'playing' || gamePhase === 'judging') && (
                                        <div className="flex flex-col md:flex-row gap-4 justify-center items-center mb-8">
                                            <button 
                                                onClick={playRhythmAudio}
                                                disabled={replaysLeft <= 0}
                                                className={`flex items-center px-6 py-4 rounded-xl font-bold text-lg text-white shadow-md transition-all ${replaysLeft > 0 ? 'bg-indigo-500 hover:bg-indigo-600 transform hover:-translate-y-1' : 'bg-gray-400 cursor-not-allowed'}`}
                                            >
                                                <i className="fa-solid fa-volume-high mr-3 text-2xl"></i>
                                                Play Rhythm ({replaysLeft} Replays Left)
                                            </button>

                                            {gamePhase === 'judging' && (
                                                <button 
                                                    onClick={() => setShowRhythm(true)}
                                                    className="flex items-center px-6 py-4 rounded-xl font-bold text-lg bg-blue-500 hover:bg-blue-600 text-white shadow-md transform transition hover:-translate-y-1"
                                                >
                                                    <i className="fa-solid fa-eye mr-3 text-2xl"></i>
                                                    Reveal Rhythm
                                                </button>
                                            )}
                                        </div>
                                    )}

                                    {showRhythm && (
                                        <div className="my-8 bg-white p-6 rounded-lg border border-gray-200 shadow-inner">
                                            <div className="text-gray-500 font-bold mb-2 uppercase text-sm">Correct Rhythm</div>
                                            <div className="flex flex-wrap justify-center items-end min-h-[6rem] gap-y-6 text-gray-800">
                                                {currentRhythm.map((group, i) => renderRhythmGroup(group, i))}
                                            </div>
                                        </div>
                                    )}

                                    {gamePhase === 'judging' && (
                                        <div className="border-t-2 border-gray-200 pt-6 mt-6">
                                            <p className="text-gray-600 font-bold mb-4">Did the {TEAMS[currentTeamIndex].name} count it correctly out loud?</p>
                                            <div className="flex gap-4 justify-center">
                                                <button onClick={() => handleNormalResult(true)} className="px-8 py-3 bg-green-500 hover:bg-green-600 text-white font-bold rounded-lg shadow flex items-center text-xl">
                                                    <i className="fa-solid fa-check-circle mr-2"></i> Pass
                                                </button>
                                                <button onClick={() => handleNormalResult(false)} className="px-8 py-3 bg-red-500 hover:bg-red-600 text-white font-bold rounded-lg shadow flex items-center text-xl">
                                                    <i className="fa-solid fa-times-circle mr-2"></i> Fail
                                                </button>
                                            </div>
                                        </div>
                                    )}

                                    {gamePhase === 'steal_opportunity' && (
                                        <div className="border-t-2 border-amber-200 bg-amber-50 p-6 rounded-xl mt-6 shadow-inner">
                                            <p className="text-amber-800 font-bold mb-4 text-xl"><i className="fa-solid fa-mask mr-2"></i> STEAL OPPORTUNITY!</p>
                                            <p className="text-amber-700 mb-6 font-medium">Do the {TEAMS[stealingTeamIndex].name} want to attempt a steal? (Risk: -1 Pos, +2 Fails if wrong!)</p>
                                            <div className="flex gap-4 justify-center">
                                                <button onClick={() => handleStealDecision(true)} className="px-8 py-3 bg-amber-500 hover:bg-amber-600 text-white font-bold rounded-lg shadow flex items-center text-lg">
                                                    <i className="fa-solid fa-bolt mr-2"></i> Attempt Steal!
                                                </button>
                                                <button onClick={() => handleStealDecision(false)} className="px-8 py-3 bg-gray-500 hover:bg-gray-600 text-white font-bold rounded-lg shadow flex items-center text-lg">
                                                    <i className="fa-solid fa-forward mr-2"></i> Pass
                                                </button>
                                            </div>
                                        </div>
                                    )}

                                    {gamePhase === 'judging_steal' && (
                                        <div className="border-t-2 border-amber-200 bg-amber-50 p-6 rounded-xl mt-6 shadow-inner">
                                            <p className="text-amber-800 font-bold mb-4 text-xl">Judging Steal...</p>
                                            <p className="text-amber-700 mb-6 font-medium">Did the {TEAMS[stealingTeamIndex].name} count the revealed rhythm perfectly?</p>
                                            <div className="flex gap-4 justify-center">
                                                <button onClick={() => handleStealResult(true)} className="px-6 py-3 bg-green-500 hover:bg-green-600 text-white font-bold rounded-lg shadow flex items-center text-lg">
                                                    <i className="fa-solid fa-check-double mr-2"></i> Steal Successful!
                                                </button>
                                                <button onClick={() => handleStealResult(false)} className="px-6 py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg shadow flex items-center text-lg">
                                                    <i className="fa-solid fa-skull-crossbones mr-2"></i> Steal Failed!
                                                </button>
                                            </div>
                                        </div>
                                    )}

                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
