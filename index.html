<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm Quest</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #050510; 
            font-family: 'Rajdhani', sans-serif; 
            color: #e2e8f0;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            background-attachment: fixed;
            margin: 0;
            min-height: 100vh;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        /* Retro Cyberpunk Effects */
        .neon-box {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            border: 2px solid #06b6d4; /* Cyan */
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.3), inset 0 0 10px rgba(6, 182, 212, 0.2);
        }
        .neon-box-amber {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            border: 2px solid #f59e0b; /* Amber */
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.3), inset 0 0 10px rgba(245, 158, 11, 0.2);
        }
        .neon-text-cyan {
            color: #22d3ee;
            text-shadow: 0 0 5px #06b6d4, 0 0 10px #06b6d4;
        }
        .neon-text-pink {
            color: #f472b6;
            text-shadow: 0 0 5px #db2777, 0 0 10px #db2777;
        }
        .cyber-btn {
            background: transparent;
            border: 2px solid #06b6d4;
            color: #22d3ee;
            text-shadow: 0 0 5px #06b6d4;
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.2), inset 0 0 5px rgba(6, 182, 212, 0.2);
            transition: all 0.2s ease-in-out;
            text-transform: uppercase;
        }
        .cyber-btn:hover:not(:disabled) {
            background: #06b6d4;
            color: #000;
            text-shadow: none;
            box-shadow: 0 0 20px #06b6d4, inset 0 0 10px #06b6d4;
        }
        .cyber-btn-pink {
            border-color: #f472b6;
            color: #f472b6;
            text-shadow: 0 0 5px #f472b6;
            box-shadow: 0 0 10px rgba(244, 114, 182, 0.2), inset 0 0 5px rgba(244, 114, 182, 0.2);
        }
        .cyber-btn-pink:hover:not(:disabled) {
            background: #f472b6;
            color: #000;
            box-shadow: 0 0 20px #f472b6, inset 0 0 10px #f472b6;
        }

        .rhythm-symbol { font-size: 3rem; margin: 0 0.25rem; display: inline-block; }
        .track-bg { 
            background: repeating-linear-gradient(45deg, #1e293b 25%, transparent 25%, transparent 75%, #1e293b 75%, #1e293b), 
                        repeating-linear-gradient(45deg, #1e293b 25%, #0f172a 25%, #0f172a 75%, #1e293b 75%, #1e293b); 
            background-position: 0 0, 10px 10px; 
            background-size: 20px 20px; 
            border: 1px solid #06b6d4;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; border-radius: 4px; border: 1px solid #334155; }
        ::-webkit-scrollbar-thumb { background: #06b6d4; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #22d3ee; box-shadow: 0 0 10px #06b6d4; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const PALETTE = [
            { c: 'bg-red-500', b: 'border-red-400', i: 'fa-fire' },         // C (Red)
            { c: 'bg-orange-500', b: 'border-orange-400', i: 'fa-bolt' },   // D (Orange)
            { c: 'bg-yellow-400', b: 'border-yellow-300', i: 'fa-sun' },    // E (Yellow)
            { c: 'bg-green-500', b: 'border-green-400', i: 'fa-leaf' },     // F (Green)
            { c: 'bg-teal-500', b: 'border-teal-400', i: 'fa-water' },      // F# / Gb (Teal)
            { c: 'bg-blue-500', b: 'border-blue-400', i: 'fa-wind' },       // G (Blue)
            { c: 'bg-indigo-500', b: 'border-indigo-400', i: 'fa-star' },   // A (Indigo)
            { c: 'bg-purple-500', b: 'border-purple-400', i: 'fa-moon' },   // B (Purple)
            { c: 'bg-pink-500', b: 'border-pink-400', i: 'fa-heart' },      // Extra/High C
            { c: 'bg-gray-600', b: 'border-gray-400', i: 'fa-drum' }        // Percussion/Neutral
        ];

        const DEFAULT_TEAMS = [
            { id: 't1', name: 'Flutes', color: PALETTE[5].c, border: PALETTE[5].b, icon: PALETTE[5].i },
            { id: 't2', name: 'Trumpets', color: PALETTE[1].c, border: PALETTE[1].b, icon: PALETTE[1].i },
        ];

        const MAX_STEPS = 10;
        const MAX_FAILS = 4;

        const RHYTHM_DICT = [
            { id: 'whole', name: 'Whole Note', beats: [4.0] },
            { id: 'half', name: 'Half Note', beats: [2.0] },
            { id: 'quarter', name: 'Quarter Note', beats: [1.0] },
            { id: 'two_8ths', name: 'Two 8th Notes', beats: [0.5, 0.5] },
            { id: 'four_16ths', name: 'Four 16th Notes', beats: [0.25, 0.25, 0.25, 0.25] },
            { id: '8th_two_16ths', name: '8th & Two 16ths', beats: [0.5, 0.25, 0.25] },
            { id: 'two_16ths_8th', name: 'Two 16ths & 8th', beats: [0.25, 0.25, 0.5] },
            { id: 'dotted_8th_16th', name: 'Dotted 8th & 16th', beats: [0.75, 0.25] },
            { id: '8th_triplets', name: '8th Note Triplets', beats: [1/3, 1/3, 1/3] },
            { id: '16th_triplets_start', name: '16th Triplets & 8th', beats: [1/6, 1/6, 1/6, 0.5] },
            { id: '16th_triplets_end', name: '8th & 16th Triplets', beats: [0.5, 1/6, 1/6, 1/6] },
            { id: 'syncopation', name: 'Syncopation (8th-Qtr-8th)', beats: [0.5, 1.0, 0.5] }
        ];

        const DEFAULT_RHYTHM_SETTINGS = {
            'whole': [true, true, true, true, true, true, true, true, true, true],
            'half': [true, true, true, true, true, true, true, true, true, true],
            'quarter': [true, true, true, true, true, true, true, true, true, true],
            'two_8ths': [false, false, false, true, true, true, true, true, true, true],
            'four_16ths': [false, false, false, true, true, true, true, true, true, true],
            '8th_two_16ths': [false, false, false, false, true, true, true, true, true, true],
            'two_16ths_8th': [false, false, false, false, true, true, true, true, true, true],
            'dotted_8th_16th': [false, false, false, false, true, true, true, true, true, true],
            '8th_triplets': [false, false, false, false, false, false, true, true, true, true],
            '16th_triplets_start': [false, false, false, false, false, false, false, true, true, true],
            '16th_triplets_end': [false, false, false, false, false, false, false, true, true, true],
            'syncopation': [false, false, false, false, false, false, false, false, true, true]
        };

        const DEFAULT_RULES = { countingSys: 'eastman', gauntlet: false, timerEnabled: true };

        const getSavedSettings = () => {
            try { 
                const saved = JSON.parse(localStorage.getItem('rq_settings')); 
                if (!saved) return DEFAULT_RHYTHM_SETTINGS;
                const merged = { ...DEFAULT_RHYTHM_SETTINGS };
                for (const key in merged) {
                    if (saved[key]) merged[key] = saved[key];
                }
                return merged;
            } catch { return DEFAULT_RHYTHM_SETTINGS; }
        };

        const getSavedRules = () => {
            try { 
                const saved = JSON.parse(localStorage.getItem('rq_rules')); 
                return saved ? { ...DEFAULT_RULES, ...saved } : DEFAULT_RULES;
            } catch { return DEFAULT_RULES; }
        };

        const getSavedGamesList = () => {
            try {
                return JSON.parse(localStorage.getItem('rq_saved_games')) || [];
            } catch { return []; }
        };

        const getShuffledTeams = (teamsArray) => {
            const indices = teamsArray.map((_, i) => i);
            for (let i = indices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [indices[i], indices[j]] = [indices[j], indices[i]];
            }
            return indices;
        };

        const getCountArrayForGroup = (group, startPos, sys) => {
            let beatNum = Math.floor(Math.round(startPos * 100) / 100) + 1;
            const fuzzyMatch = (arr) => group.length === arr.length && group.every((v, i) => Math.abs(v - arr[i]) < 0.01);
            
            // Master Override for Triplets as Requested
            if (sys === 'eastman') {
                if (fuzzyMatch([1/3, 1/3, 1/3])) return [`${beatNum}`, 'te', 'ta'];
                if (fuzzyMatch([1/6, 1/6, 1/6, 0.5])) return [`${beatNum}`, 'ta', 'la', 'te'];
                if (fuzzyMatch([0.5, 1/6, 1/6, 1/6])) return [`${beatNum}`, 'te', 'ta', 'la'];
            } else {
                if (fuzzyMatch([1/3, 1/3, 1/3])) return [`${beatNum}`, 'trip', 'let'];
                if (fuzzyMatch([1/6, 1/6, 1/6, 0.5])) return [`${beatNum}`, 'trip', 'let', '&'];
                if (fuzzyMatch([0.5, 1/6, 1/6, 1/6])) return [`${beatNum}`, '&', 'trip', 'let'];
            }

            const getSyllable = (pos, duration) => {
                let b = Math.floor(Math.round(pos * 100) / 100) + 1;
                let fraction = Math.round((pos - Math.floor(Math.round(pos * 100) / 100)) * 100) / 100;
                let syl = '';

                // Default Simple Meter counting logic
                if (fraction === 0) syl = b.toString();
                else if (fraction === 0.5) syl = sys === 'eastman' ? 'te' : '&';
                else if (fraction === 0.25) syl = sys === 'eastman' ? 'ti' : 'e';
                else if (fraction === 0.75) syl = sys === 'eastman' ? 'ta' : 'a';
                else syl = '+';

                // Formatting dashed durations
                if (fraction === 0) {
                    if (Math.abs(duration - 4.0) < 0.01) return `${b} - - -`;
                    if (Math.abs(duration - 3.0) < 0.01) return `${b} - -`;
                    if (Math.abs(duration - 2.0) < 0.01) return `${b} -`; // E.g. "1 -"
                }
                
                if (duration === 1.0 && fraction === 0.5) return `${syl}-`;
                if (duration === 0.75) return `${syl}-`; 

                return syl;
            };

            let res = [];
            let p = startPos;
            for(let i=0; i<group.length; i++) {
                res.push(getSyllable(p, group[i]));
                p = Math.round((p + group[i]) * 100) / 100;
            }
            return res;
        };

        const renderRhythmGroup = (group, index, startPos, showCounts, sys) => {
            const key = `group-${index}`;
            const fuzzyMatch = (arr) => group.length === arr.length && group.every((v, i) => Math.abs(v - arr[i]) < 0.01);
            
            const counts = getCountArrayForGroup(group, startPos, sys);
            let svgContent = null;

            // Use neon-friendly styling for SVGs
            if (fuzzyMatch([4.0])) svgContent = (
                <svg viewBox="0 0 60 80" className="w-14 h-20 fill-none stroke-cyan-400 drop-shadow-[0_0_5px_rgba(6,182,212,0.8)]">
                    <ellipse cx="30" cy="65" rx="10" ry="7" transform="rotate(-20 30 65)" strokeWidth="4" />
                </svg>
            );
            else if (fuzzyMatch([3.0])) svgContent = (
                <svg viewBox="0 0 60 80" className="w-14 h-20 fill-none stroke-cyan-400 drop-shadow-[0_0_5px_rgba(6,182,212,0.8)]">
                    <ellipse cx="15" cy="65" rx="8" ry="5" transform="rotate(-20 15 65)" strokeWidth="3" />
                    <line x1="22" y1="65" x2="22" y2="20" strokeWidth="2" />
                    <circle cx="32" cy="60" r="2.5" className="fill-cyan-400" stroke="none" />
                </svg>
            );
            else if (fuzzyMatch([2.0])) svgContent = (
                <svg viewBox="0 0 50 80" className="w-12 h-20 fill-none stroke-cyan-400 drop-shadow-[0_0_5px_rgba(6,182,212,0.8)]">
                    <ellipse cx="15" cy="65" rx="8" ry="5" transform="rotate(-20 15 65)" strokeWidth="3" />
                    <line x1="22" y1="65" x2="22" y2="20" strokeWidth="2" />
                </svg>
            );
            else if (fuzzyMatch([1.5])) svgContent = (
                <svg viewBox="0 0 60 80" className="w-14 h-20 fill-cyan-400 stroke-cyan-400 drop-shadow-[0_0_5px_rgba(6,182,212,0.8)]">
                    <ellipse cx="15" cy="65" rx="8" ry="5" transform="rotate(-20 15 65)" />
                    <line x1="22" y1="65" x2="22" y2="20" strokeWidth="2" />
                    <circle cx="32" cy="60" r="2.5" fill="currentColor" stroke="none" />
                </svg>
            );
            else if (fuzzyMatch([1.0])) svgContent = (
                <svg viewBox="0 0 50 80" className="w-12 h-20 fill-cyan-400 stroke-cyan-400 drop-shadow-[0_0_5px_rgba(6,182,212,0.8)]">
                    <ellipse cx="15" cy="65" rx="8" ry="5" transform="rotate(-20 15 65)" />
                    <line x1="22" y1="65" x2="22" y2="20" strokeWidth="2" />
                </svg>
            );
            else if (fuzzyMatch([0.5])) svgContent = (
                <svg viewBox="0 0 50 80" className="w-12 h-20 fill-cyan-400 stroke-cyan-400 drop-shadow-[0_0_5px_rgba(6,182,212,0.8)]">
                    <ellipse cx="15" cy="65" rx="8" ry="5" transform="rotate(-20 15 65)" />
                    <line x1="22" y1="65" x2="22" y2="20" strokeWidth="2" />
                    <path d="M 22 20 Q 35 25 35 40 Q 30 30 22 35" fill="currentColor" stroke="none" />
                </svg>
            );
            else if (fuzzyMatch([0.25])) svgContent = (
                <svg viewBox="0 0 50 80" className="w-12 h-20 fill-cyan-400 stroke-cyan-400 drop-shadow-[0_0_5px_rgba(6,182,212,0.8)]">
                    <ellipse cx="15" cy="65" rx="8" ry="5" transform="rotate(-20 15 65)" />
                    <line x1="22" y1="65" x2="22" y2="20" strokeWidth="2" />
                    <path d="M 22 20 Q 35 25 35 40 Q 30 30 22 35" fill="currentColor" stroke="none" />
                    <path d="M 22 32 Q 35 37 35 52 Q 30 42 22 47" fill="currentColor" stroke="none" />
                </svg>
            );
            else if (fuzzyMatch([0.5, 0.5])) svgContent = (
                <svg viewBox="0 0 50 80" className="w-12 h-20 fill-cyan-400 stroke-cyan-400 drop-shadow-[0_0_5px_rgba(6,182,212,0.8)]">
                    <ellipse cx="12" cy="65" rx="7" ry="5" transform="rotate(-20 12 65)" />
                    <ellipse cx="38" cy="65" rx="7" ry="5" transform="rotate(-20 38 65)" />
                    <line x1="17" y1="65" x2="17" y2="20" strokeWidth="2" />
                    <line x1="43" y1="65" x2="43" y2="20" strokeWidth="2" />
                    <rect x="16" y="20" width="28" height="6" />
                </svg>
            );
            else if (fuzzyMatch([0.25, 0.25, 0.25, 0.25])) svgContent = (
                <svg viewBox="0 0 100 80" className="w-24 h-20 fill-cyan-400 stroke-cyan-400 drop-shadow-[0_0_5px_rgba(6,182,212,0.8)]">
                    {[12, 37, 62, 87].map((cx, i) => <ellipse key={'h'+i} cx={cx} cy="65" rx="7" ry="5" transform={`rotate(-20 ${cx} 65)`} />)}
                    {[17, 42, 67, 92].map((x, i) => <line key={'s'+i} x1={x} y1="65" x2={x} y2="20" strokeWidth="2" />)}
                    <rect x="16" y="20" width="77" height="6" />
                    <rect x="16" y="30" width="77" height="6" />
                </svg>
            );
            else if (fuzzyMatch([0.5, 0.25, 0.25])) svgContent = (
                <svg viewBox="0 0 75 80" className="w-20 h-20 fill-cyan-400 stroke-cyan-400 drop-shadow-[0_0_5px_rgba(6,182,212,0.8)]">
                    {[12, 42, 62].map((cx, i) => <ellipse key={'h'+i} cx={cx} cy="65" rx="7" ry="5" transform={`rotate(-20 ${cx} 65)`} />)}
                    {[17, 47, 67].map((x, i) => <line key={'s'+i} x1={x} y1="65" x2={x} y2="20" strokeWidth="2" />)}
                    <rect x="16" y="20" width="52" height="6" />
                    <rect x="46" y="30" width="22" height="6" />
                </svg>
            );
            else if (fuzzyMatch([0.25, 0.25, 0.5])) svgContent = (
                <svg viewBox="0 0 75 80" className="w-20 h-20 fill-cyan-400 stroke-cyan-400 drop-shadow-[0_0_5px_rgba(6,182,212,0.8)]">
                    {[12, 32, 62].map((cx, i) => <ellipse key={'h'+i} cx={cx} cy="65" rx="7" ry="5" transform={`rotate(-20 ${cx} 65)`} />)}
                    {[17, 37, 67].map((x, i) => <line key={'s'+i} x1={x} y1="65" x2={x} y2="20" strokeWidth="2" />)}
                    <rect x="16" y="20" width="52" height="6" />
                    <rect x="16" y="30" width="22" height="6" />
                </svg>
            );
            else if (fuzzyMatch([0.75, 0.25])) svgContent = (
                <svg viewBox="0 0 60 80" className="w-14 h-20 fill-cyan-400 stroke-cyan-400 drop-shadow-[0_0_5px_rgba(6,182,212,0.8)]">
                    <ellipse cx="12" cy="65" rx="7" ry="5" transform="rotate(-20 12 65)" />
                    <circle cx="26" cy="60" r="2.5" />
                    <ellipse cx="46" cy="65" rx="7" ry="5" transform="rotate(-20 46 65)" />
                    <line x1="17" y1="65" x2="17" y2="20" strokeWidth="2" />
                    <line x1="51" y1="65" x2="51" y2="20" strokeWidth="2" />
                    <rect x="16" y="20" width="36" height="6" />
                    <rect x="38" y="30" width="14" height="6" />
                </svg>
            );
            else if (fuzzyMatch([1/3, 1/3, 1/3])) svgContent = (
                <svg viewBox="0 0 75 80" className="w-20 h-20 fill-cyan-400 stroke-cyan-400 drop-shadow-[0_0_5px_rgba(6,182,212,0.8)]">
                    <text x="32" y="15" fontSize="14" className="font-orbitron" fontWeight="bold">3</text>
                    {[12, 37, 62].map((cx, i) => <ellipse key={'h'+i} cx={cx} cy="65" rx="7" ry="5" transform={`rotate(-20 ${cx} 65)`} />)}
                    {[17, 42, 67].map((x, i) => <line key={'s'+i} x1={x} y1="65" x2={x} y2="25" strokeWidth="2" />)}
                    <rect x="16" y="25" width="52" height="6" />
                </svg>
            );
            else if (fuzzyMatch([1/6, 1/6, 1/6, 0.5])) svgContent = (
                <svg viewBox="0 0 100 80" className="w-24 h-20 fill-cyan-400 stroke-cyan-400 drop-shadow-[0_0_5px_rgba(6,182,212,0.8)]">
                    <text x="37" y="15" fontSize="14" className="font-orbitron" fontWeight="bold">3</text>
                    {[12, 37, 62, 87].map((cx, i) => <ellipse key={'h'+i} cx={cx} cy="65" rx="7" ry="5" transform={`rotate(-20 ${cx} 65)`} />)}
                    {[17, 42, 67, 92].map((x, i) => <line key={'s'+i} x1={x} y1="65" x2={x} y2="25" strokeWidth="2" />)}
                    <rect x="16" y="25" width="77" height="6" />
                    <rect x="16" y="35" width="52" height="6" />
                </svg>
            );
            else if (fuzzyMatch([0.5, 1/6, 1/6, 1/6])) svgContent = (
                <svg viewBox="0 0 100 80" className="w-24 h-20 fill-cyan-400 stroke-cyan-400 drop-shadow-[0_0_5px_rgba(6,182,212,0.8)]">
                    <text x="62" y="15" fontSize="14" className="font-orbitron" fontWeight="bold">3</text>
                    {[12, 37, 62, 87].map((cx, i) => <ellipse key={'h'+i} cx={cx} cy="65" rx="7" ry="5" transform={`rotate(-20 ${cx} 65)`} />)}
                    {[17, 42, 67, 92].map((x, i) => <line key={'s'+i} x1={x} y1="65" x2={x} y2="25" strokeWidth="2" />)}
                    <rect x="16" y="25" width="77" height="6" />
                    <rect x="41" y="35" width="52" height="6" />
                </svg>
            );
            else if (fuzzyMatch([0.5, 1.0, 0.5])) svgContent = (
                <svg viewBox="0 0 100 80" className="w-24 h-20 fill-cyan-400 stroke-cyan-400 drop-shadow-[0_0_5px_rgba(6,182,212,0.8)]">
                    <ellipse cx="15" cy="65" rx="8" ry="5" transform="rotate(-20 15 65)" />
                    <line x1="22" y1="65" x2="22" y2="20" strokeWidth="2" />
                    <path d="M 22 20 Q 35 25 35 40 Q 30 30 22 35" fill="currentColor" stroke="none" />
                    
                    <ellipse cx="50" cy="65" rx="8" ry="5" transform="rotate(-20 50 65)" />
                    <line x1="57" y1="65" x2="57" y2="20" strokeWidth="2" />
                    
                    <ellipse cx="85" cy="65" rx="8" ry="5" transform="rotate(-20 85 65)" />
                    <line x1="92" y1="65" x2="92" y2="20" strokeWidth="2" />
                    <path d="M 92 20 Q 105 25 105 40 Q 100 30 92 35" fill="currentColor" stroke="none" />
                </svg>
            );
            else svgContent = <span className="rhythm-symbol font-bold text-red-500">?</span>;

            return (
                <div key={key} className="flex flex-col items-center mx-2 my-2 justify-start">
                    {svgContent}
                    <div className={`mt-2 font-mono font-extrabold text-pink-400 text-lg transition-opacity duration-300 tracking-widest whitespace-nowrap h-7 drop-shadow-[0_0_5px_rgba(244,114,182,0.8)] ${showCounts ? 'opacity-100' : 'opacity-0'}`}>
                        {counts.join(' ')}
                    </div>
                </div>
            );
        };

        const generateMeasure = (difficultyLevel = 0, settings) => {
            const levelIndex = Math.min(9, difficultyLevel);
            const numMeasures = levelIndex >= 8 ? 2 : 1; 
            const allGroups = [];

            for (let m = 0; m < numMeasures; m++) {
                const measureGroups = [];
                let remaining = 4.0;
                
                while(remaining > 0.01) { 
                    let availablePatterns = [];
                    
                    RHYTHM_DICT.forEach(r => {
                        if (settings[r.id][levelIndex]) {
                            const sum = r.beats.reduce((a, b) => a + b, 0);
                            if (sum <= remaining + 0.01) {
                                availablePatterns.push(r.beats);
                            }
                        }
                    });

                    if (availablePatterns.length === 0) {
                        if (remaining >= 4.0) availablePatterns.push([4.0]);
                        else if (remaining >= 3.0) availablePatterns.push([3.0]);
                        else if (remaining >= 2.0) availablePatterns.push([2.0]);
                        else if (remaining >= 1.5) availablePatterns.push([1.5]);
                        else if (remaining >= 1.0) availablePatterns.push([1.0]);
                        else if (remaining >= 0.5) availablePatterns.push([0.5, 0.5]);
                        else if (remaining >= 0.25) availablePatterns.push([0.25, 0.25]); 
                        else availablePatterns.push([remaining]); 
                    }

                    const p = availablePatterns[Math.floor(Math.random() * availablePatterns.length)];
                    measureGroups.push(p);
                    
                    const sum = p.reduce((a, b) => a + b, 0);
                    remaining -= sum;
                    remaining = Math.round(remaining * 100) / 100;
                }
                
                allGroups.push(...measureGroups);
                if (m < numMeasures - 1) {
                    allGroups.push("BARLINE");
                }
            }
            return allGroups;
        };

        const generateSpecificRhythm = (rhythmId, numMeasures) => {
            const r = RHYTHM_DICT.find(x => x.id === rhythmId);
            if (!r) return [];
            const allGroups = [];
            
            for (let m = 0; m < numMeasures; m++) {
                let remaining = 4.0;
                const measureGroups = [];
                while (remaining > 0.01) {
                    const sum = r.beats.reduce((a, b) => a + b, 0);
                    if (sum <= remaining + 0.01) {
                        measureGroups.push(r.beats);
                        remaining -= sum;
                    } else {
                        if (remaining >= 1.0) { measureGroups.push([1.0]); remaining -= 1.0; }
                        else if (remaining >= 0.5) { measureGroups.push([0.5, 0.5]); remaining -= 1.0; } 
                        else { measureGroups.push([remaining]); remaining = 0; }
                    }
                    remaining = Math.round(remaining * 100) / 100;
                }
                allGroups.push(...measureGroups);
                if (m < numMeasures - 1) allGroups.push("BARLINE");
            }
            return allGroups;
        };

        const App = () => {
            const [appView, setAppView] = React.useState('title'); 
            
            const [savedGames, setSavedGames] = React.useState(getSavedGamesList());
            const [teams, setTeams] = React.useState(DEFAULT_TEAMS);
            const [newTeamName, setNewTeamName] = React.useState('');
            const [newTeamColor, setNewTeamColor] = React.useState(PALETTE[0]);
            const [setupTab, setSetupTab] = React.useState('teams'); 
            const [rhythmSettings, setRhythmSettings] = React.useState(getSavedSettings());
            const [rules, setRules] = React.useState(getSavedRules());
            
            const [currentGameId, setCurrentGameId] = React.useState(null);
            const [saveName, setSaveName] = React.useState('');
            const [stats, setStats] = React.useState({}); 
            const [currentTeamIndex, setCurrentTeamIndex] = React.useState(0);
            const [stealingTeamIndex, setStealingTeamIndex] = React.useState(null);
            const [turnQueue, setTurnQueue] = React.useState([]);
            const [story, setStory] = React.useState("SYSTEM BOOT. AWAITING RHYTHM INPUT.");
            const [currentRhythm, setCurrentRhythm] = React.useState([]);
            const [replaysLeft, setReplaysLeft] = React.useState(2);
            const [showCounts, setShowCounts] = React.useState(false);
            
            const [teacherRhythmId, setTeacherRhythmId] = React.useState('whole');
            const [teacherMeasures, setTeacherMeasures] = React.useState(1);

            const [timeLeft, setTimeLeft] = React.useState(15);
            const [isAudioPlaying, setIsAudioPlaying] = React.useState(false);

            const [gamePhase, setGamePhase] = React.useState('start'); 
            const [winner, setWinner] = React.useState(null);
            const [audioCtx, setAudioCtx] = React.useState(null);
            const victoryAudio = React.useRef(new Audio('we-are-the-champions-copia.mp3'));

            const updateRules = (updates) => {
                const newRules = { ...rules, ...updates };
                setRules(newRules);
                localStorage.setItem('rq_rules', JSON.stringify(newRules));
            };

            const saveSettings = (newSettings) => {
                setRhythmSettings(newSettings);
                localStorage.setItem('rq_settings', JSON.stringify(newSettings));
            };

            const toggleSetting = (rhythmId, levelIndex) => {
                const newSettings = { ...rhythmSettings };
                newSettings[rhythmId][levelIndex] = !newSettings[rhythmId][levelIndex];
                saveSettings(newSettings);
            };

            const initAudio = () => {
                if (!audioCtx) {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    setAudioCtx(ctx);
                    return ctx;
                }
                return audioCtx;
            };

            const playNote = (ctx, time, duration, isCountIn = false) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (isCountIn) {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(800, time);
                    osc.frequency.exponentialRampToValueAtTime(100, time + 0.1);

                    gain.gain.setValueAtTime(1, time);
                    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);

                    osc.start(time);
                    osc.stop(time + 0.1);
                } else {
                    osc.type = 'sawtooth'; // Cyberpunk edge
                    osc.frequency.setValueAtTime(440, time);

                    const attack = 0.02;
                    const release = Math.min(0.05, duration * 0.2);

                    gain.gain.setValueAtTime(0, time);
                    gain.gain.linearRampToValueAtTime(0.6, time + attack);
                    gain.gain.setValueAtTime(0.6, time + duration - release);
                    gain.gain.linearRampToValueAtTime(0, time + duration);

                    osc.start(time);
                    osc.stop(time + duration);
                }
            };

            const playRhythmAudio = () => {
                if (replaysLeft <= 0 || isAudioPlaying) return;
                
                const ctx = initAudio();
                if (ctx.state === 'suspended') ctx.resume();

                setIsAudioPlaying(true);
                const bpm = 75;
                const beatDuration = 60 / bpm;
                let startTime = ctx.currentTime + 0.2;

                for (let i = 0; i < 4; i++) {
                    playNote(ctx, startTime + i * beatDuration, 0, true);
                }

                startTime += 4 * beatDuration;
                let currentOffset = 0;
                
                currentRhythm.forEach(group => {
                    if (group === "BARLINE") return;
                    group.forEach(noteDuration => {
                        const durationInSeconds = noteDuration * beatDuration;
                        const articulationGap = Math.min(0.05, durationInSeconds * 0.1); 
                        const playDuration = durationInSeconds - articulationGap;

                        playNote(ctx, startTime + currentOffset * beatDuration, playDuration, false);
                        currentOffset += noteDuration;
                    });
                });

                const totalRhythmBeats = currentRhythm.filter(g => g !== "BARLINE").flat().reduce((a, b) => a + b, 0);
                const totalTimeMs = (0.2 + (4 + totalRhythmBeats) * beatDuration) * 1000;
                
                setTimeout(() => {
                    setIsAudioPlaying(false);
                }, totalTimeMs);

                if (appView === 'game' && gamePhase === 'playing') setReplaysLeft(prev => prev - 1);
            };

            React.useEffect(() => {
                let timer;
                if (rules.timerEnabled && appView === 'game' && (gamePhase === 'playing' || gamePhase === 'judging_steal') && !isAudioPlaying && timeLeft > 0) {
                    timer = setTimeout(() => setTimeLeft(prev => prev - 1), 1000);
                }
                return () => clearTimeout(timer);
            }, [timeLeft, gamePhase, isAudioPlaying, rules.timerEnabled, appView]);

            React.useEffect(() => {
                if (rules.timerEnabled && appView === 'game' && timeLeft === 0 && !isAudioPlaying) {
                    if (gamePhase === 'playing') handleNormalResult(false);
                    else if (gamePhase === 'judging_steal') handleStealResult(false);
                }
            // eslint-disable-next-line react-hooks/exhaustive-deps
            }, [timeLeft, isAudioPlaying, rules.timerEnabled, appView]);

            const handleSaveGame = () => {
                if (!saveName.trim()) return alert("Enter Save Designation!");
                const gameId = currentGameId || 'save_' + Date.now();
                const newSave = {
                    id: gameId,
                    name: saveName.trim(),
                    teams,
                    stats,
                    currentTeamIndex,
                    turnQueue,
                    gamePhase,
                    story,
                    currentRhythm,
                    replaysLeft,
                    date: new Date().toLocaleString()
                };
                
                let updatedGames = [...savedGames];
                const existingIdx = updatedGames.findIndex(g => g.id === gameId);
                if (existingIdx >= 0) updatedGames[existingIdx] = newSave;
                else updatedGames.push(newSave);

                setSavedGames(updatedGames);
                localStorage.setItem('rq_saved_games', JSON.stringify(updatedGames));
                setCurrentGameId(gameId);
                alert("MEMORY LOGGED TO VAULT.");
            };

            const loadGame = (saveObj) => {
                setTeams(saveObj.teams);
                let migratedStats = { ...saveObj.stats };
                for (const key in migratedStats) {
                    if (migratedStats[key].score === undefined) {
                        migratedStats[key].score = migratedStats[key].pos || 0;
                        migratedStats[key].level = migratedStats[key].pos || 0;
                    }
                }
                setStats(migratedStats);
                setCurrentTeamIndex(saveObj.currentTeamIndex);
                setTurnQueue(saveObj.turnQueue);
                setGamePhase(saveObj.gamePhase);
                setStory(saveObj.story);
                setCurrentRhythm(saveObj.currentRhythm);
                setReplaysLeft(saveObj.replaysLeft);
                setCurrentGameId(saveObj.id);
                setSaveName(saveObj.name);
                setShowCounts(false);
                setIsAudioPlaying(false);
                setTimeLeft(15);
                setAppView('game');
            };

            const deleteSave = (id) => {
                if(confirm("DELETE PROTOCOL INITIATED. CONFIRM?")) {
                    const updated = savedGames.filter(g => g.id !== id);
                    setSavedGames(updated);
                    localStorage.setItem('rq_saved_games', JSON.stringify(updated));
                }
            };

            const handleAddTeam = () => {
                if (newTeamName.trim() && teams.length < 20) {
                    setTeams([...teams, {
                        id: 'team_' + Date.now(),
                        name: newTeamName.trim(),
                        color: newTeamColor.c, border: newTeamColor.b, icon: newTeamColor.i
                    }]);
                    setNewTeamName('');
                }
            };

            const handleRemoveTeam = (id) => {
                setTeams(teams.filter(t => t.id !== id));
            };

            const getNextAliveTeam = (currentStats, currentQueue) => {
                const activeIndices = teams.map((_, i) => i).filter(i => rules.gauntlet || currentStats[teams[i].id].fails < MAX_FAILS);
                if (activeIndices.length === 0) return null;

                let nextQueue = currentQueue.filter(i => activeIndices.includes(i));
                if (nextQueue.length === 0) {
                    nextQueue = getShuffledTeams(teams).filter(i => activeIndices.includes(i));
                }
                return { teamIdx: nextQueue[0], newQueue: nextQueue.slice(1) };
            };

            const triggerVictory = (winningTeam) => {
                setWinner(winningTeam);
                setGamePhase('gameover');
                setStory(`MISSION ACCOMPLISHED. ${winningTeam.name.toUpperCase()} ARE THE SUPREME CHAMPIONS.`);
                victoryAudio.current.play().catch(e => console.log("Audio play prevented:", e));
            };

            const startGame = () => {
                initAudio();
                const initialQueue = getShuffledTeams(teams);
                setCurrentTeamIndex(initialQueue[0]);
                setTurnQueue(initialQueue.slice(1));
                
                const initStats = {};
                teams.forEach(t => { initStats[t.id] = { score: 0, level: 0, fails: 0, reveals: 1 }; });
                setStats(initStats);
                
                const initialRhythm = generateMeasure(0, rhythmSettings);
                setCurrentRhythm(initialRhythm);
                setReplaysLeft(2);
                setShowCounts(false);
                setTimeLeft(15);
                setIsAudioPlaying(false);
                setGamePhase('playing');
                setCurrentGameId(null);
                setSaveName('');
                setStory(`SYSTEM ONLINE. ${teams[initialQueue[0]].name.toUpperCase()} TURN ENGAGED.`);
            };

            const handleTurnAdvance = (newStats, lastActionStory) => {
                const nextTarget = getNextAliveTeam(newStats, turnQueue);
                
                if (!nextTarget) {
                    setGamePhase('gameover'); setWinner(null);
                    setStory(`FATAL ERROR. ALL TEAMS ELIMINATED.`);
                    return;
                }

                setStats(newStats);
                setTurnQueue(nextTarget.newQueue);
                setCurrentTeamIndex(nextTarget.teamIdx);
                
                const nextDifficulty = newStats[teams[nextTarget.teamIdx].id].level;
                const nextRhythm = generateMeasure(nextDifficulty, rhythmSettings);
                setCurrentRhythm(nextRhythm);
                setReplaysLeft(2);
                setShowCounts(false);
                setTimeLeft(15);
                setIsAudioPlaying(false);
                setGamePhase('playing');
                setStory(lastActionStory);
            };

            const handleRevealCounts = () => {
                const activeId = gamePhase === 'playing' ? teams[currentTeamIndex].id : teams[stealingTeamIndex].id;
                let newStats = JSON.parse(JSON.stringify(stats));
                if (newStats[activeId].reveals > 0) {
                    newStats[activeId].reveals -= 1;
                    setStats(newStats);
                    setShowCounts(true);
                }
            };

            const handleManualAdjust = (teamId, delta) => {
                let newStats = JSON.parse(JSON.stringify(stats));
                const team = teams.find(t => t.id === teamId);
                
                newStats[teamId].score = Math.max(0, newStats[teamId].score + delta);
                setStats(newStats);
                
                if (newStats[teamId].score >= MAX_STEPS) {
                    triggerVictory(team);
                }
            };

            const handleNormalResult = (passed) => {
                const currentTeam = teams[currentTeamIndex];
                let newStats = JSON.parse(JSON.stringify(stats));

                if (passed) {
                    newStats[currentTeam.id].score += 1;
                    newStats[currentTeam.id].level = Math.min(9, newStats[currentTeam.id].level + 1); 
                    if (newStats[currentTeam.id].score >= MAX_STEPS) {
                        setStats(newStats);
                        triggerVictory(currentTeam);
                        return;
                    }
                    
                    const nextTarget = getNextAliveTeam(newStats, turnQueue);
                    if (nextTarget) {
                        handleTurnAdvance(newStats, `SUCCESS. ${teams[nextTarget.teamIdx].name.toUpperCase()} DEPLOYED.`);
                    } else {
                        setStats(newStats); setGamePhase('gameover'); setWinner(null); setStory(`FATAL ERROR. TPK.`);
                    }
                } else {
                    if (rules.gauntlet) {
                        newStats[currentTeam.id].score = Math.max(0, newStats[currentTeam.id].score - 1);
                    } else {
                        newStats[currentTeam.id].fails += 1;
                    }
                    setStats(newStats);
                    
                    const nextTarget = getNextAliveTeam(newStats, turnQueue);
                    if (!nextTarget) {
                        setGamePhase('gameover'); setWinner(null); setStory(`FATAL ERROR. ALL TEAMS ELIMINATED.`);
                        return;
                    }

                    setGamePhase('steal_selection');
                }
            };

            const handleStealResult = (stealSuccess) => {
                const stealingTeam = teams[stealingTeamIndex];
                let newStats = JSON.parse(JSON.stringify(stats));

                if (stealSuccess) {
                    newStats[stealingTeam.id].score += 1;
                    newStats[stealingTeam.id].level = Math.min(9, newStats[stealingTeam.id].level + 1);
                    newStats[stealingTeam.id].reveals += 1; 
                    
                    if (newStats[stealingTeam.id].score >= MAX_STEPS) {
                        setStats(newStats);
                        triggerVictory(stealingTeam);
                        return;
                    }
                    
                    const nextTarget = getNextAliveTeam(newStats, turnQueue);
                    handleTurnAdvance(newStats, `OVERRIDE SUCCESSFUL. +1 REVEAL. ${teams[nextTarget.teamIdx].name.toUpperCase()} READY.`);
                } else {
                    if (rules.gauntlet) {
                        newStats[stealingTeam.id].score = Math.max(0, newStats[stealingTeam.id].score - 2); 
                    } else {
                        newStats[stealingTeam.id].score = Math.max(0, newStats[stealingTeam.id].score - 1);
                        newStats[stealingTeam.id].fails += 2;
                    }

                    const nextTarget = getNextAliveTeam(newStats, turnQueue);
                    if (!nextTarget) {
                        setStats(newStats); setGamePhase('gameover'); setWinner(null); setStory(`FATAL ERROR. TPK.`);
                        return;
                    }
                    handleTurnAdvance(newStats, `OVERRIDE FAILED. DAMAGE TAKEN. ${teams[nextTarget.teamIdx].name.toUpperCase()} READY.`);
                }
            };

            const renderTrack = () => {
                return (
                    <div className="neon-box p-6 rounded-2xl mb-6">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-2xl font-bold text-cyan-400 orbitron tracking-widest uppercase">Quest Progress</h2>
                            {rules.gauntlet && <span className="bg-red-600 text-white px-3 py-1 rounded-full font-bold text-sm uppercase shadow-[0_0_10px_#dc2626]"><i className="fa-solid fa-fire mr-2"></i>Gauntlet</span>}
                        </div>
                        <div className="space-y-4">
                            {teams.map((team, idx) => {
                                const teamStat = stats[team.id] || { score: 0, level: 0, fails: 0, reveals: 1 };
                                const isEliminated = !rules.gauntlet && teamStat.fails >= MAX_FAILS;
                                const isCurrentTurn = currentTeamIndex === idx && gamePhase === 'playing' && !isEliminated;
                                const isStealingTurn = stealingTeamIndex === idx && gamePhase === 'judging_steal' && !isEliminated;
                                
                                return (
                                <div key={team.id} className={`relative transition-opacity duration-500 ${isEliminated ? 'opacity-40 grayscale' : 'opacity-100'}`}>
                                    <div className="flex items-center mb-1">
                                        <div className={`w-40 font-bold flex flex-col justify-center ${isCurrentTurn ? 'text-cyan-400 neon-text' : isStealingTurn ? 'text-fuchsia-400 neon-text-pink' : 'text-slate-300'}`}>
                                            <div className={`text-lg flex items-center orbitron ${(isCurrentTurn || isStealingTurn) ? 'text-xl' : ''}`}>
                                                {isCurrentTurn && <i className="fa-solid fa-caret-right mr-2 text-cyan-400 animate-pulse"></i>}
                                                {isStealingTurn && <i className="fa-solid fa-mask mr-2 text-fuchsia-400 animate-bounce"></i>}
                                                {team.name}
                                                <span className="ml-2 text-xs bg-slate-800 border border-slate-600 px-2 py-1 rounded-md text-slate-300 font-sans" title="Difficulty Level">LVL {Math.min(10, teamStat.level + 1)}</span>
                                            </div>
                                            {!isEliminated && gamePhase !== 'gameover' && (
                                                <div className="flex gap-1 mt-1 z-30">
                                                    <button onClick={() => handleManualAdjust(team.id, 1)} className="bg-slate-800 border border-green-500 hover:bg-green-900 text-green-400 w-6 h-6 rounded flex items-center justify-center shadow-[0_0_5px_#22c55e]" title="+1 Score"><i className="fa-solid fa-plus text-xs"></i></button>
                                                    <button onClick={() => handleManualAdjust(team.id, -1)} className="bg-slate-800 border border-red-500 hover:bg-red-900 text-red-400 w-6 h-6 rounded flex items-center justify-center shadow-[0_0_5px_#ef4444]" title="-1 Score"><i className="fa-solid fa-minus text-xs"></i></button>
                                                </div>
                                            )}
                                            {!rules.gauntlet && (
                                                <div className="flex text-red-500 text-xs mt-1">
                                                    {[...Array(MAX_FAILS)].map((_, i) => (
                                                        <i key={i} className={`fa-solid fa-xmark mr-1 ${i < teamStat.fails ? 'opacity-100 drop-shadow-[0_0_3px_#ef4444]' : 'opacity-20'}`}></i>
                                                    ))}
                                                </div>
                                            )}
                                            {isEliminated && <div className="text-red-500 text-xs font-black uppercase mt-1 drop-shadow-[0_0_5px_#ef4444]">Eliminated!</div>}
                                        </div>
                                        <div className="flex-1 h-12 rounded-full relative track-bg ml-2 overflow-hidden">
                                            <div className="absolute right-0 top-0 bottom-0 w-8 bg-yellow-400 border-l-4 border-yellow-600 flex items-center justify-center z-10 shadow-[0_0_15px_#eab308]">
                                                <i className="fa-solid fa-gem text-black text-xs"></i>
                                            </div>
                                            
                                            <div 
                                                className={`absolute top-0 bottom-0 transition-all duration-700 ease-in-out flex items-center justify-center z-20`}
                                                style={{ left: `${(teamStat.score / MAX_STEPS) * 92}%`, width: '8%' }}
                                            >
                                                <div className={`w-10 h-10 ${team.color} border-2 ${team.border} rounded-full flex items-center justify-center shadow-[0_0_10px_currentColor] ${isCurrentTurn ? 'transform scale-125 ring-2 ring-cyan-400' : isStealingTurn ? 'transform scale-125 ring-2 ring-fuchsia-400' : ''}`}>
                                                    <i className={`fa-solid ${team.icon} text-white`}></i>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            if (appView === 'title') {
                return (
                    <div className="min-h-screen p-4 flex items-center justify-center relative overflow-hidden">
                        <div className="neon-box p-10 md:p-14 rounded-3xl max-w-xl w-full text-center relative z-10 transform transition-all hover:scale-[1.01]">
                            <h1 className="text-5xl md:text-6xl font-black orbitron text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-pink-500 mb-2 drop-shadow-[0_0_10px_rgba(6,182,212,0.8)]">
                                MR. A'S RHYTHM QUEST
                            </h1>
                            <div className="text-cyan-200 font-bold tracking-widest uppercase mb-10 text-xl flex items-center justify-center gap-3">
                                <span className="h-px w-8 bg-cyan-500 shadow-[0_0_5px_#06b6d4]"></span>
                                Version 12.0
                                <span className="h-px w-8 bg-cyan-500 shadow-[0_0_5px_#06b6d4]"></span>
                            </div>

                            <div className="flex flex-col gap-5">
                                <button 
                                    onClick={() => setAppView('setup')}
                                    className="cyber-btn py-5 rounded-xl font-black text-2xl flex items-center justify-center tracking-widest"
                                >
                                    <i className="fa-solid fa-play mr-3"></i> Initialize Quest
                                </button>
                                
                                <button 
                                    onClick={() => setAppView('load')}
                                    className="cyber-btn py-4 rounded-xl font-bold text-xl flex items-center justify-center tracking-widest"
                                >
                                    <i className="fa-solid fa-folder-open mr-3"></i> Access Vault
                                </button>

                                <button 
                                    onClick={() => {
                                        setAppView('teacher');
                                        setCurrentRhythm(generateSpecificRhythm('whole', 1));
                                    }}
                                    className="cyber-btn-pink cyber-btn py-4 rounded-xl font-bold text-xl flex items-center justify-center tracking-widest"
                                >
                                    <i className="fa-solid fa-chalkboard-user mr-3"></i> Practice Forge
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (appView === 'load') {
                return (
                    <div className="min-h-screen p-4 flex flex-col items-center relative overflow-hidden">
                        <div className="w-full max-w-3xl neon-box p-8 rounded-3xl relative z-10 mt-10">
                            <button onClick={() => setAppView('title')} className="absolute left-6 top-6 text-slate-400 hover:text-cyan-400 transition-colors" title="Back to Title">
                                <i className="fa-solid fa-arrow-left text-2xl"></i>
                            </button>
                            <h2 className="text-4xl font-black text-center neon-text-cyan mb-8 mt-2 orbitron uppercase tracking-wider"><i className="fa-solid fa-vault mr-4"></i>Memory Vault</h2>
                            
                            <div className="flex flex-col gap-4 max-h-96 overflow-y-auto pr-2">
                                {savedGames.length === 0 ? (
                                    <div className="text-center text-slate-400 font-medium py-8 italic border border-slate-700 rounded-xl">NO MEMORY LOGS FOUND.</div>
                                ) : (
                                    savedGames.map(g => (
                                        <div key={g.id} className="bg-slate-800 border border-cyan-700 p-4 rounded-xl flex justify-between items-center shadow-[0_0_10px_rgba(6,182,212,0.1)] hover:shadow-[0_0_15px_rgba(6,182,212,0.3)] transition-shadow">
                                            <div>
                                                <h3 className="font-bold text-xl text-cyan-100 orbitron">{g.name}</h3>
                                                <p className="text-sm text-slate-400 font-mono"><i className="fa-solid fa-clock mr-1"></i> {g.date} | {g.teams.length} Teams</p>
                                            </div>
                                            <div className="flex gap-3">
                                                <button onClick={() => loadGame(g)} className="cyber-btn px-6 py-2 rounded-lg text-sm font-bold">
                                                    LOAD
                                                </button>
                                                <button onClick={() => deleteSave(g.id)} className="border border-red-500 text-red-500 hover:bg-red-500 hover:text-black px-4 py-2 rounded-lg shadow-[0_0_5px_#ef4444] transition-colors">
                                                    <i className="fa-solid fa-trash"></i>
                                                </button>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </div>
                )
            }

            if (appView === 'teacher') {
                return (
                    <div className="min-h-screen p-4 flex flex-col items-center relative overflow-hidden">
                        <div className="w-full max-w-4xl neon-box-amber p-8 rounded-3xl relative z-10 mt-4">
                            <button 
                                onClick={() => { if (audioCtx) audioCtx.suspend(); setIsAudioPlaying(false); setAppView('title'); }} 
                                className="absolute left-6 top-6 text-slate-400 hover:text-amber-400 transition-colors"
                            >
                                <i className="fa-solid fa-arrow-left text-2xl"></i>
                            </button>
                            <h2 className="text-4xl font-black text-center text-amber-400 mb-8 mt-2 orbitron uppercase tracking-wider drop-shadow-[0_0_8px_#f59e0b]"><i className="fa-solid fa-hammer mr-4"></i>Practice Forge</h2>
                            
                            <div className="bg-slate-800 p-6 rounded-xl border border-amber-600 mb-8 flex flex-wrap gap-6 justify-center items-end shadow-[inset_0_0_15px_rgba(245,158,11,0.1)]">
                                <div className="flex flex-col">
                                    <label className="font-bold text-amber-500 mb-2 font-mono">Select Rhythm Focus</label>
                                    <select 
                                        value={teacherRhythmId}
                                        onChange={(e) => {
                                            setTeacherRhythmId(e.target.value);
                                            setCurrentRhythm(generateSpecificRhythm(e.target.value, teacherMeasures));
                                            setShowCounts(false);
                                            setReplaysLeft(99); 
                                        }}
                                        className="px-4 py-3 rounded-lg border-2 border-amber-500 bg-slate-900 text-amber-100 font-bold focus:outline-none focus:ring-2 focus:ring-amber-400"
                                    >
                                        {RHYTHM_DICT.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
                                    </select>
                                </div>
                                <div className="flex flex-col">
                                    <label className="font-bold text-amber-500 mb-2 font-mono">Measures</label>
                                    <select 
                                        value={teacherMeasures}
                                        onChange={(e) => {
                                            setTeacherMeasures(parseInt(e.target.value));
                                            setCurrentRhythm(generateSpecificRhythm(teacherRhythmId, parseInt(e.target.value)));
                                            setShowCounts(false);
                                        }}
                                        className="px-4 py-3 rounded-lg border-2 border-amber-500 bg-slate-900 text-amber-100 font-bold focus:outline-none focus:ring-2 focus:ring-amber-400"
                                    >
                                        <option value={1}>1 Measure</option>
                                        <option value={2}>2 Measures</option>
                                    </select>
                                </div>
                                <button 
                                    onClick={() => setShowCounts(!showCounts)}
                                    className={`px-6 py-3 font-bold rounded-lg transition-colors border-2 ${showCounts ? 'bg-indigo-600 border-indigo-400 text-white shadow-[0_0_10px_#4f46e5]' : 'border-indigo-600 text-indigo-400 hover:bg-indigo-900'}`}
                                >
                                    <i className={`fa-solid ${showCounts ? 'fa-eye-slash' : 'fa-eye'} mr-2`}></i> {showCounts ? 'HIDE' : 'REVEAL'}
                                </button>
                                <button 
                                    onClick={() => { setReplaysLeft(99); playRhythmAudio(); }}
                                    disabled={isAudioPlaying}
                                    className="px-8 py-3 bg-transparent border-2 border-amber-500 text-amber-500 hover:bg-amber-500 hover:text-black font-bold rounded-lg shadow-[0_0_10px_#f59e0b] transition-all disabled:opacity-50"
                                >
                                    <i className="fa-solid fa-play mr-2"></i> {isAudioPlaying ? 'PLAYING' : 'EXECUTE'}
                                </button>
                            </div>

                            <div className="bg-slate-900 p-8 rounded-2xl border-2 border-cyan-700 shadow-[0_0_20px_rgba(6,182,212,0.2)] min-h-[16rem] flex flex-wrap justify-center items-center gap-y-10">
                                {(() => {
                                    let currentBeatPos = 0;
                                    return currentRhythm.map((group, i) => {
                                        if (group === "BARLINE") {
                                            currentBeatPos = 0;
                                            return (
                                                <div key={`bar-${i}`} className="flex flex-col items-center mx-4 my-2 justify-start">
                                                    <svg viewBox="0 0 10 80" className="w-2 h-20 fill-none stroke-cyan-600 drop-shadow-[0_0_5px_#0891b2]">
                                                        <line x1="5" y1="15" x2="5" y2="70" strokeWidth="4" />
                                                    </svg>
                                                    <div className={`mt-2 h-7`}></div>
                                                </div>
                                            );
                                        }
                                        const el = renderRhythmGroup(group, i, currentBeatPos, showCounts, rules.countingSys);
                                        currentBeatPos = Math.round((currentBeatPos + group.reduce((a, b) => a + b, 0)) * 100) / 100;
                                        return el;
                                    });
                                })()}
                            </div>
                        </div>
                    </div>
                )
            }

            if (appView === 'setup') {
                return (
                    <div className="min-h-screen p-4 md:p-8 flex flex-col items-center relative overflow-hidden">
                        <div className="w-full max-w-4xl neon-box p-8 md:p-10 rounded-3xl relative z-10">
                            <button onClick={() => setAppView('title')} className="absolute left-6 top-6 text-slate-400 hover:text-cyan-400 transition-colors" title="Back to Title">
                                <i className="fa-solid fa-arrow-left text-2xl"></i>
                            </button>
                            <h2 className="text-4xl font-black text-center neon-text-cyan mb-6 mt-2 orbitron tracking-widest"><i className="fa-solid fa-wrench mr-4"></i>Configuration</h2>
                            
                            <div className="flex justify-center mb-6 border-b border-slate-700 pb-4 overflow-x-auto whitespace-nowrap">
                                <button onClick={() => setSetupTab('teams')} className={`px-6 py-2 mx-2 font-bold rounded-lg border-2 transition-all ${setupTab === 'teams' ? 'bg-cyan-500 border-cyan-400 text-black shadow-[0_0_10px_#06b6d4]' : 'border-slate-600 text-slate-400 hover:border-cyan-700'}`}>
                                    <i className="fa-solid fa-users mr-2"></i> Roster
                                </button>
                                <button onClick={() => setSetupTab('rules')} className={`px-6 py-2 mx-2 font-bold rounded-lg border-2 transition-all ${setupTab === 'rules' ? 'bg-cyan-500 border-cyan-400 text-black shadow-[0_0_10px_#06b6d4]' : 'border-slate-600 text-slate-400 hover:border-cyan-700'}`}>
                                    <i className="fa-solid fa-sliders mr-2"></i> Parameters
                                </button>
                                <button onClick={() => setSetupTab('difficulty')} className={`px-6 py-2 mx-2 font-bold rounded-lg border-2 transition-all ${setupTab === 'difficulty' ? 'bg-cyan-500 border-cyan-400 text-black shadow-[0_0_10px_#06b6d4]' : 'border-slate-600 text-slate-400 hover:border-cyan-700'}`}>
                                    <i className="fa-solid fa-server mr-2"></i> Matrix
                                </button>
                            </div>

                            {setupTab === 'teams' && (
                                <div>
                                    <div className="bg-slate-800 p-6 rounded-xl border border-cyan-900 mb-6 shadow-[inset_0_0_10px_rgba(0,0,0,0.5)]">
                                        <label className="block text-cyan-200 font-bold mb-3 font-mono text-sm uppercase tracking-wider"><i className="fa-solid fa-palette mr-2 text-cyan-400"></i>1. Assign Color Variant</label>
                                        <div className="flex flex-wrap gap-3 mb-6 justify-start">
                                            {PALETTE.map((p, idx) => (
                                                <button 
                                                    key={idx} 
                                                    onClick={() => setNewTeamColor(p)}
                                                    className={`w-12 h-12 rounded-full shadow-md ${p.c} border-4 transition-all ${newTeamColor.c === p.c ? 'border-white scale-125 ring-2 ring-cyan-400 z-10' : 'border-transparent hover:scale-110'}`}
                                                >
                                                    <i className={`fa-solid ${p.i} text-white opacity-75`}></i>
                                                </button>
                                            ))}
                                        </div>

                                        <label className="block text-cyan-200 font-bold mb-3 font-mono text-sm uppercase tracking-wider"><i className="fa-solid fa-pen mr-2 text-cyan-400"></i>2. Input Designation</label>
                                        <div className="flex flex-col md:flex-row gap-4 items-center">
                                            <input 
                                                type="text" 
                                                value={newTeamName} 
                                                onChange={(e) => setNewTeamName(e.target.value)}
                                                onKeyDown={(e) => e.key === 'Enter' && handleAddTeam()}
                                                className="flex-1 px-5 py-4 rounded-xl border-2 border-slate-600 bg-slate-900 text-white focus:border-cyan-400 focus:ring-2 focus:ring-cyan-500 focus:outline-none text-lg font-orbitron"
                                                placeholder="e.g. ALTO SAXES"
                                                maxLength={25}
                                            />
                                            <button 
                                                onClick={handleAddTeam}
                                                disabled={!newTeamName.trim() || teams.length >= 20}
                                                className={`cyber-btn px-8 py-4 rounded-xl font-bold text-lg disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:bg-transparent disabled:hover:text-cyan-400`}
                                            >
                                                <i className="fa-solid fa-plus mr-2"></i> Register
                                            </button>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-8 max-h-80 overflow-y-auto p-2">
                                        {teams.map((t, idx) => (
                                            <div key={t.id} className={`${t.color} text-white p-3 rounded-xl shadow-[0_0_10px_currentColor] flex justify-between items-center border border-black`}>
                                                <div className="font-bold text-lg flex items-center font-orbitron tracking-wider">
                                                    <i className={`fa-solid ${t.icon} mr-3 opacity-75`}></i>
                                                    {t.name}
                                                </div>
                                                <button onClick={() => handleRemoveTeam(t.id)} className="bg-black/20 hover:bg-red-500 text-white transition-colors p-2 rounded-md">
                                                    <i className="fa-solid fa-trash"></i>
                                                </button>
                                            </div>
                                        ))}
                                        {teams.length === 0 && (
                                            <div className="col-span-full text-center text-slate-500 font-medium py-8 italic font-mono">No units registered. Minimum 2 required.</div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {setupTab === 'rules' && (
                                <div className="space-y-6 mb-8 max-h-96 overflow-y-auto p-2">

                                    <div className="bg-slate-800 p-6 rounded-xl border border-cyan-800 shadow-sm">
                                        <label className="block text-cyan-200 font-bold mb-3 font-mono text-sm uppercase tracking-wider"><i className="fa-solid fa-comment-dots mr-3 text-cyan-400"></i>Syllable Protocol</label>
                                        <div className="flex gap-4">
                                            <button onClick={() => updateRules({ countingSys: 'eastman' })} className={`flex-1 py-4 rounded-xl font-bold text-lg border-2 transition-all ${rules.countingSys === 'eastman' ? 'bg-cyan-500 border-cyan-400 text-black shadow-[0_0_10px_#06b6d4]' : 'bg-transparent border-slate-600 text-slate-400 hover:border-cyan-700'}`}>Eastman (1 ti te ta)</button>
                                            <button onClick={() => updateRules({ countingSys: 'traditional' })} className={`flex-1 py-4 rounded-xl font-bold text-lg border-2 transition-all ${rules.countingSys === 'traditional' ? 'bg-cyan-500 border-cyan-400 text-black shadow-[0_0_10px_#06b6d4]' : 'bg-transparent border-slate-600 text-slate-400 hover:border-cyan-700'}`}>Traditional (1 e & a)</button>
                                        </div>
                                    </div>

                                    <div className="bg-slate-800 p-6 rounded-xl border border-cyan-800 shadow-sm">
                                        <label className="block text-cyan-200 font-bold mb-3 font-mono text-sm uppercase tracking-wider"><i className="fa-solid fa-stopwatch mr-3 text-cyan-400"></i>Temporal Countdown</label>
                                        <div className="flex items-center justify-between">
                                            <p className="text-slate-400 font-medium max-w-lg text-sm">Enables the 15-second pressure timer. Disable for rookie training.</p>
                                            <button onClick={() => updateRules({ timerEnabled: !rules.timerEnabled })} className={`relative w-16 h-8 rounded-full transition-all border-2 ${rules.timerEnabled ? 'bg-cyan-500 border-cyan-400 shadow-[0_0_10px_#06b6d4]' : 'bg-slate-700 border-slate-600'}`}>
                                                <div className={`absolute top-0.5 bg-white w-6 h-6 rounded-full shadow transition-all ${rules.timerEnabled ? 'left-8' : 'left-0.5'}`}></div>
                                            </button>
                                        </div>
                                    </div>

                                    <div className="bg-slate-800 p-6 rounded-xl border border-red-800 shadow-sm">
                                        <label className="block text-red-400 font-bold mb-3 font-mono text-sm uppercase tracking-wider"><i className="fa-solid fa-fire mr-3"></i>Gauntlet Override</label>
                                        <div className="flex items-center justify-between">
                                            <p className="text-slate-400 font-medium max-w-lg text-sm">Removes elimination (Red X's). Teams instead lose Position (-1 fail, -2 failed steals).</p>
                                            <button onClick={() => updateRules({ gauntlet: !rules.gauntlet })} className={`relative w-16 h-8 rounded-full transition-all border-2 ${rules.gauntlet ? 'bg-red-500 border-red-400 shadow-[0_0_10px_#ef4444]' : 'bg-slate-700 border-slate-600'}`}>
                                                <div className={`absolute top-0.5 bg-white w-6 h-6 rounded-full shadow transition-all ${rules.gauntlet ? 'left-8' : 'left-0.5'}`}></div>
                                            </button>
                                        </div>
                                    </div>

                                </div>
                            )}

                            {setupTab === 'difficulty' && (
                                <div className="mb-8">
                                    <div className="bg-cyan-900/50 border border-cyan-500 text-cyan-100 p-4 rounded-lg mb-4 text-sm font-mono shadow-[0_0_5px_#06b6d4]">
                                        <i className="fa-solid fa-terminal mr-2"></i> Configure algorithm logic per level (1-10). Auto-saves to local cache.
                                    </div>
                                    <div className="overflow-x-auto border-2 border-cyan-800 rounded-xl bg-slate-900 max-h-96">
                                        <table className="w-full text-left border-collapse">
                                            <thead className="bg-slate-800 sticky top-0 z-10 shadow-md">
                                                <tr>
                                                    <th className="p-3 border-b border-cyan-800 font-orbitron text-cyan-400 whitespace-nowrap uppercase tracking-wider">Rhythm Signature</th>
                                                    {[...Array(10)].map((_, i) => (
                                                        <th key={i} className="p-3 border-b border-cyan-800 text-center font-bold text-fuchsia-400 font-mono">L{i+1}</th>
                                                    ))}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {RHYTHM_DICT.map((r, rowIndex) => (
                                                    <tr key={r.id} className={rowIndex % 2 === 0 ? 'bg-slate-900' : 'bg-slate-800/50'}>
                                                        <td className="p-3 border-b border-slate-700 font-semibold text-slate-300 whitespace-nowrap font-mono">{r.name}</td>
                                                        {[...Array(10)].map((_, levelIndex) => (
                                                            <td key={levelIndex} className="p-3 border-b border-slate-700 text-center">
                                                                <input 
                                                                    type="checkbox" 
                                                                    checked={rhythmSettings[r.id][levelIndex]}
                                                                    onChange={() => toggleSetting(r.id, levelIndex)}
                                                                    className="w-5 h-5 text-cyan-500 bg-slate-700 border-slate-500 rounded focus:ring-cyan-500 focus:ring-offset-slate-900 cursor-pointer"
                                                                />
                                                            </td>
                                                        ))}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            <button 
                                onClick={() => { setAppView('game'); startGame(); }}
                                disabled={teams.length < 2}
                                className={`w-full cyber-btn py-5 rounded-2xl font-black text-2xl tracking-widest disabled:opacity-50 disabled:cursor-not-allowed`}
                            >
                                INITIATE SEQUENCE <i className="fa-solid fa-forward-step ml-2"></i>
                            </button>
                        </div>
                    </div>
                )
            }

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-5xl mx-auto flex flex-col relative">
                    
                    <button 
                        onClick={() => { 
                            if (audioCtx && audioCtx.state === 'running') audioCtx.suspend();
                            setIsAudioPlaying(false);
                            setAppView('title'); 
                        }} 
                        className="absolute left-4 top-4 md:left-8 md:top-8 bg-slate-900 text-cyan-400 border-2 border-cyan-500 hover:bg-cyan-500 hover:text-black w-12 h-12 rounded-full shadow-[0_0_10px_#06b6d4] flex items-center justify-center transition-all z-[100]" 
                        title="Abort Protocol"
                    >
                        <i className="fa-solid fa-power-off text-xl"></i>
                    </button>

                    <header className="text-center mb-8 relative pt-12 md:pt-0">
                        <h1 className="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-pink-500 drop-shadow-[0_0_10px_rgba(6,182,212,0.8)] mb-2 orbitron tracking-widest uppercase">
                            <i className="fa-solid fa-music mr-4 text-cyan-400"></i>
                            Rhythm Quest
                            <i className="fa-solid fa-server ml-4 text-pink-500"></i>
                        </h1>
                        <p className="text-slate-400 font-mono tracking-widest text-sm">A CYBERNETIC RHYTHM SIMULATION</p>
                    </header>

                    {renderTrack()}

                    <div className="neon-box rounded-2xl overflow-hidden flex-1 flex flex-col">
                        <div className="bg-slate-900 border-b-2 border-cyan-600 p-4 text-white flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="font-bold text-xl flex items-center font-orbitron tracking-wider text-cyan-300 drop-shadow-[0_0_5px_#06b6d4]">
                                <i className="fa-solid fa-terminal mr-3"></i>
                                SYSTEM LOG
                            </div>
                            
                            <div className="flex gap-4 items-center">
                                {gamePhase !== 'start' && gamePhase !== 'gameover' && (
