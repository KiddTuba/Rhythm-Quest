                                    <div className={`px-4 py-2 rounded-md font-bold font-mono text-sm tracking-wider border-2 ${gamePhase.includes('steal') ? 'bg-fuchsia-900 border-fuchsia-500 text-fuchsia-200 shadow-[0_0_10px_#d946ef]' : 'bg-cyan-900 border-cyan-500 text-cyan-100 shadow-[0_0_10px_#06b6d4]'}`}>
                                        {gamePhase.includes('steal') ? (
                                            <><i className="fa-solid fa-triangle-exclamation mr-2 animate-pulse"></i> STEAL OVERRIDE</>
                                        ) : (
                                            <><i className="fa-solid fa-user-check mr-2"></i> ACTIVE: {teams[currentTeamIndex].name}</>
                                        )}
                                    </div>
                                )}
                                
                                <div className="flex items-center gap-2 bg-slate-800 border border-slate-600 p-1 rounded-md">
                                    <input 
                                        type="text" 
                                        value={saveName} 
                                        onChange={e => setSaveName(e.target.value)} 
                                        placeholder="Memory ID..." 
                                        className="px-3 py-1 rounded bg-slate-900 text-cyan-100 text-sm w-32 focus:outline-none focus:ring-1 focus:ring-cyan-500 font-mono"
                                    />
                                    <button 
                                        onClick={handleSaveGame} 
                                        className="bg-cyan-600 hover:bg-cyan-500 text-black px-3 py-1 rounded text-sm font-bold shadow-[0_0_5px_#06b6d4] transition-colors"
                                    >
                                        <i className="fa-solid fa-floppy-disk"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        
                        <div className="p-8 flex-1 flex flex-col items-center justify-center text-center">
                            <p className="text-2xl font-mono text-cyan-100 leading-relaxed mb-8 uppercase tracking-wide drop-shadow-[0_0_5px_rgba(6,182,212,0.5)]">>{story}</p>

                            {gamePhase === 'start' && (
                                <button onClick={startGame} className="cyber-btn px-10 py-4 rounded-xl font-black text-2xl tracking-widest mt-4">
                                    EXECUTE START
                                </button>
                            )}

                            {gamePhase === 'gameover' && (
                                <div className="mt-8 animate-bounce">
                                    {winner ? (
                                        <h2 className="text-4xl font-black text-yellow-400 mb-4 orbitron drop-shadow-[0_0_15px_#eab308]">
                                            <i className="fa-solid fa-trophy mr-4"></i>
                                            {winner.name} WIN!
                                            <i className="fa-solid fa-trophy ml-4"></i>
                                        </h2>
                                    ) : (
                                        <h2 className="text-4xl font-black text-red-500 mb-4 orbitron drop-shadow-[0_0_15px_#ef4444]">
                                            <i className="fa-solid fa-skull mr-4"></i>
                                            FATAL ERROR
                                            <i className="fa-solid fa-skull ml-4"></i>
                                        </h2>
                                    )}
                                    <button onClick={() => { victoryAudio.current.pause(); victoryAudio.current.currentTime = 0; setAppView('title'); }} className="cyber-btn px-6 py-3 font-bold rounded-xl mt-4 text-lg">
                                        Return to Mainframe
                                    </button>
                                </div>
                            )}

                            {(gamePhase === 'playing' || gamePhase === 'steal_selection' || gamePhase === 'judging_steal') && (
                                <div className="w-full max-w-4xl bg-slate-900 p-6 rounded-xl border border-slate-700 shadow-inner">
                                    
                                    {(gamePhase === 'playing' || gamePhase === 'judging_steal') && rules.timerEnabled && (
                                        <div className={`text-6xl font-black mb-4 flex justify-center items-center font-orbitron tracking-widest ${timeLeft <= 5 ? 'text-red-500 drop-shadow-[0_0_15px_#ef4444] animate-pulse' : 'text-cyan-400 drop-shadow-[0_0_10px_#06b6d4]'}`}>
                                            <i className={`fa-solid ${isAudioPlaying ? 'fa-headphones text-4xl' : 'fa-clock text-4xl'} mr-6`}></i>
                                            {isAudioPlaying ? 'AUDIO' : `00:${timeLeft.toString().padStart(2, '0')}`}
                                        </div>
                                    )}

                                    <div className="my-4 bg-slate-800 p-6 rounded-xl border-2 border-cyan-800 shadow-[0_0_15px_rgba(6,182,212,0.1)] overflow-x-auto relative">
                                        <div className="text-cyan-400 font-bold mb-4 uppercase tracking-widest text-lg flex justify-between items-center font-mono">
                                            <span>> Current_Sequence (4/4)</span>
                                            {gamePhase !== 'steal_selection' && (
                                                <button 
                                                    onClick={handleRevealCounts}
                                                    disabled={showCounts || stats[gamePhase === 'playing' ? teams[currentTeamIndex].id : teams[stealingTeamIndex].id]?.reveals <= 0}
                                                    className={`px-4 py-2 text-sm rounded border-2 font-bold transition-colors uppercase tracking-widest ${showCounts || stats[gamePhase === 'playing' ? teams[currentTeamIndex].id : teams[stealingTeamIndex].id]?.reveals <= 0 ? 'bg-slate-700 border-slate-600 text-slate-500 cursor-not-allowed' : 'bg-transparent border-fuchsia-500 text-fuchsia-400 hover:bg-fuchsia-500 hover:text-black shadow-[0_0_10px_#d946ef]'}`}
                                                >
                                                    <i className="fa-solid fa-code mr-2"></i> 
                                                    Decrypt ({stats[gamePhase === 'playing' ? teams[currentTeamIndex].id : teams[stealingTeamIndex].id]?.reveals})
                                                </button>
                                            )}
                                        </div>
                                        
                                        <div className="flex flex-wrap justify-center items-end min-h-[8rem] gap-y-8 text-cyan-200 py-4">
                                            {(() => {
                                                let currentBeatPos = 0;
                                                return currentRhythm.map((group, i) => {
                                                    if (group === "BARLINE") {
                                                        currentBeatPos = 0;
                                                        return (
                                                            <div key={`bar-${i}`} className="flex flex-col items-center mx-2 my-2 justify-start">
                                                                <svg viewBox="0 0 10 80" className="w-2 h-20 fill-none stroke-fuchsia-500 drop-shadow-[0_0_8px_#d946ef]">
                                                                    <line x1="5" y1="15" x2="5" y2="70" strokeWidth="4" />
                                                                </svg>
                                                                <div className={`mt-2 h-7`}></div>
                                                            </div>
                                                        );
                                                    }
                                                    const el = renderRhythmGroup(group, i, currentBeatPos, showCounts, rules.countingSys);
                                                    currentBeatPos = Math.round((currentBeatPos + group.reduce((a, b) => a + b, 0)) * 100) / 100;
                                                    return el;
                                                });
                                            })()}
                                        </div>
                                    </div>

                                    {(gamePhase === 'playing' || gamePhase === 'judging_steal') && (
                                        <div className="flex flex-col gap-6 justify-center items-center mt-8 pt-6 border-t border-slate-700">
                                            <button 
                                                onClick={playRhythmAudio}
                                                disabled={replaysLeft <= 0 || isAudioPlaying}
                                                className={`cyber-btn px-8 py-4 rounded-xl font-bold text-xl flex items-center tracking-widest disabled:opacity-30 disabled:cursor-not-allowed`}
                                            >
                                                <i className="fa-solid fa-satellite-dish mr-3 text-2xl"></i>
                                                TRANSMIT AUDIO ({replaysLeft})
                                            </button>

                                            <div className="w-full mt-4">
                                                <p className="text-slate-300 font-mono mb-4 text-sm tracking-widest uppercase">Awaiting Verification for: <span className="text-cyan-400 font-bold text-lg">{gamePhase === 'playing' ? teams[currentTeamIndex].name : teams[stealingTeamIndex].name}</span></p>
                                                <div className="flex gap-6 justify-center">
                                                    <button onClick={() => gamePhase === 'playing' ? handleNormalResult(true) : handleStealResult(true)} className="bg-transparent border-2 border-green-500 text-green-400 hover:bg-green-500 hover:text-black px-10 py-4 font-bold rounded-xl shadow-[0_0_10px_#22c55e] flex items-center text-2xl transition-all uppercase tracking-widest">
                                                        <i className="fa-solid fa-check-circle mr-3"></i> Valid
                                                    </button>
                                                    <button onClick={() => gamePhase === 'playing' ? handleNormalResult(false) : handleStealResult(false)} className="bg-transparent border-2 border-red-500 text-red-500 hover:bg-red-500 hover:text-black px-10 py-4 font-bold rounded-xl shadow-[0_0_10px_#ef4444] flex items-center text-2xl transition-all uppercase tracking-widest">
                                                        <i className="fa-solid fa-times-circle mr-3"></i> Invalid
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {gamePhase === 'steal_selection' && (
                                        <div className="border-2 border-fuchsia-500 bg-slate-900 p-6 rounded-xl mt-6 shadow-[0_0_20px_rgba(217,70,239,0.3)]">
                                            <p className="text-fuchsia-400 font-black mb-2 text-2xl orbitron tracking-widest uppercase drop-shadow-[0_0_8px_#d946ef]"><i className="fa-solid fa-triangle-exclamation mr-2"></i> FREE FOR ALL OVERRIDE</p>
                                            <p className="text-slate-300 mb-6 font-mono text-sm uppercase tracking-wide">{teams[currentTeamIndex].name} FAILED. SELECT TEAM TO ATTEMPT OVERRIDE.</p>
                                            <div className="flex flex-wrap gap-4 justify-center">
                                                {teams.map((t, idx) => {
                                                    if (idx === currentTeamIndex || (!rules.gauntlet && stats[t.id]?.fails >= MAX_FAILS)) return null;
                                                    return (
                                                        <button 
                                                            key={t.id} 
                                                            onClick={() => { setStealingTeamIndex(idx); setTimeLeft(15); setGamePhase('judging_steal'); }} 
                                                            className={`px-6 py-4 ${t.color} text-white font-bold rounded-xl shadow-[0_0_10px_currentColor] transform hover:scale-105 transition-all flex items-center text-xl font-orbitron uppercase border border-black`}
                                                        >
                                                            <i className={`fa-solid ${t.icon} mr-3 opacity-70`}></i> {t.name}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                            <div className="mt-8 flex justify-center">
                                                <button onClick={() => {
                                                    const nextTarget = getNextAliveTeam(stats, turnQueue);
                                                    handleTurnAdvance(stats, `OVERRIDE ABORTED. ${teams[nextTarget.teamIdx].name.toUpperCase()} READY.`);
                                                }} className="bg-transparent border-2 border-slate-500 text-slate-400 hover:bg-slate-500 hover:text-black px-8 py-3 font-bold rounded-xl transition-colors text-sm font-mono tracking-widest">
                                                    CANCEL OVERRIDE
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
