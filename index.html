<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm Quest</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0fdfa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .rhythm-symbol { font-size: 3rem; margin: 0 0.25rem; display: inline-block; }
        .track-bg { background-image: repeating-linear-gradient(45deg, #e5e7eb 25%, transparent 25%, transparent 75%, #e5e7eb 75%, #e5e7eb), repeating-linear-gradient(45deg, #e5e7eb 25%, #ffffff 25%, #ffffff 75%, #e5e7eb 75%, #e5e7eb); background-position: 0 0, 10px 10px; background-size: 20px 20px; }
        
        /* Custom scrollbar for settings */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #059669; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const PALETTE = [
            { c: 'bg-blue-500', b: 'border-blue-700', i: 'fa-wind' },
            { c: 'bg-teal-500', b: 'border-teal-700', i: 'fa-water' },
            { c: 'bg-yellow-400', b: 'border-yellow-600', i: 'fa-fire' },
            { c: 'bg-orange-500', b: 'border-orange-700', i: 'fa-bolt' },
            { c: 'bg-red-500', b: 'border-red-700', i: 'fa-mountain' },
            { c: 'bg-purple-500', b: 'border-purple-700', i: 'fa-drum' },
            { c: 'bg-pink-500', b: 'border-pink-700', i: 'fa-heart' },
            { c: 'bg-indigo-500', b: 'border-indigo-700', i: 'fa-star' },
            { c: 'bg-cyan-500', b: 'border-cyan-700', i: 'fa-moon' },
            { c: 'bg-rose-500', b: 'border-rose-700', i: 'fa-leaf' }
        ];

        const DEFAULT_TEAMS = [
            { id: 't1', name: 'Flutes', color: PALETTE[0].c, border: PALETTE[0].b, icon: PALETTE[0].i },
            { id: 't2', name: 'Trumpets', color: PALETTE[3].c, border: PALETTE[3].b, icon: PALETTE[3].i },
        ];

        const MAX_STEPS = 10;
        const MAX_FAILS = 4;

        // Master Dictionary of all Rhythms
        const RHYTHM_DICT = [
            { id: 'whole', name: 'Whole Note', beats: [4.0] },
            { id: 'half', name: 'Half Note', beats: [2.0] },
            { id: 'quarter', name: 'Quarter Note', beats: [1.0] },
            { id: 'two_8ths', name: 'Two 8th Notes', beats: [0.5, 0.5] },
            { id: 'four_16ths', name: 'Four 16th Notes', beats: [0.25, 0.25, 0.25, 0.25] },
            { id: '8th_two_16ths', name: '8th & Two 16ths', beats: [0.5, 0.25, 0.25] },
            { id: 'two_16ths_8th', name: 'Two 16ths & 8th', beats: [0.25, 0.25, 0.5] },
            { id: '8th_triplets', name: '8th Note Triplets', beats: [1/3, 1/3, 1/3] },
            { id: '16th_triplets_start', name: '16th Triplets & 8th', beats: [1/6, 1/6, 1/6, 0.5] },
            { id: '16th_triplets_end', name: '8th & 16th Triplets', beats: [0.5, 1/6, 1/6, 1/6] },
            { id: 'syncopation', name: 'Syncopation (8th-Qtr-8th)', beats: [0.5, 1.0, 0.5] },
            { id: 'dotted_qtr_8th', name: 'Dotted Qtr & 8th', beats: [1.5, 0.5] }
        ];

        const DEFAULT_RHYTHM_SETTINGS = {
            'whole': [true, true, true, true, true, true, true, true, true, true],
            'half': [true, true, true, true, true, true, true, true, true, true],
            'quarter': [true, true, true, true, true, true, true, true, true, true],
            'two_8ths': [false, false, false, true, true, true, true, true, true, true],
            'four_16ths': [false, false, false, true, true, true, true, true, true, true],
            '8th_two_16ths': [false, false, false, false, true, true, true, true, true, true],
            'two_16ths_8th': [false, false, false, false, true, true, true, true, true, true],
            '8th_triplets': [false, false, false, false, false, false, true, true, true, true],
            '16th_triplets_start': [false, false, false, false, false, false, false, true, true, true],
            '16th_triplets_end': [false, false, false, false, false, false, false, true, true, true],
            'syncopation': [false, false, false, false, false, false, false, false, true, true],
            'dotted_qtr_8th': [false, false, false, false, false, false, false, false, true, true]
        };

        const getSavedSettings = () => {
            try {
                const saved = localStorage.getItem('rq_settings');
                return saved ? JSON.parse(saved) : DEFAULT_RHYTHM_SETTINGS;
            } catch { return DEFAULT_RHYTHM_SETTINGS; }
        };

        const getShuffledTeams = (teamsArray) => {
            const indices = teamsArray.map((_, i) => i);
            for (let i = indices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [indices[i], indices[j]] = [indices[j], indices[i]];
            }
            return indices;
        };

        const renderRhythmGroup = (group, index) => {
            const key = `group-${index}`;
            const fuzzyMatch = (arr) => group.length === arr.length && group.every((v, i) => Math.abs(v - arr[i]) < 0.01);

            // Universal SVG replacements for Whole, Half, Quarter notes to prevent iOS square issues
            if (fuzzyMatch([4.0])) return (
                <svg key={key} viewBox="0 0 50 80" className="w-12 h-20 inline-block mx-1 fill-none stroke-current">
                    <ellipse cx="25" cy="65" rx="10" ry="7" transform="rotate(-20 25 65)" strokeWidth="4" />
                </svg>
            );
            if (fuzzyMatch([2.0])) return (
                <svg key={key} viewBox="0 0 50 80" className="w-12 h-20 inline-block mx-1 fill-none stroke-current">
                    <ellipse cx="15" cy="65" rx="8" ry="5" transform="rotate(-20 15 65)" strokeWidth="3" />
                    <line x1="22" y1="65" x2="22" y2="20" strokeWidth="2" />
                </svg>
            );
            if (fuzzyMatch([1.0])) return (
                <svg key={key} viewBox="0 0 50 80" className="w-12 h-20 inline-block mx-1 fill-current stroke-current">
                    <ellipse cx="15" cy="65" rx="8" ry="5" transform="rotate(-20 15 65)" />
                    <line x1="22" y1="65" x2="22" y2="20" strokeWidth="2" />
                </svg>
            );

            if (fuzzyMatch([0.5, 0.5])) return (
                <svg key={key} viewBox="0 0 50 80" className="w-12 h-20 inline-block mx-1 fill-current stroke-current">
                    <ellipse cx="12" cy="65" rx="7" ry="5" transform="rotate(-20 12 65)" />
                    <ellipse cx="38" cy="65" rx="7" ry="5" transform="rotate(-20 38 65)" />
                    <line x1="17" y1="65" x2="17" y2="20" strokeWidth="2" />
                    <line x1="43" y1="65" x2="43" y2="20" strokeWidth="2" />
                    <rect x="16" y="20" width="28" height="6" />
                </svg>
            );

            if (fuzzyMatch([0.25, 0.25, 0.25, 0.25])) return (
                <svg key={key} viewBox="0 0 100 80" className="w-24 h-20 inline-block mx-1 fill-current stroke-current">
                    {[12, 37, 62, 87].map((cx, i) => <ellipse key={'h'+i} cx={cx} cy="65" rx="7" ry="5" transform={`rotate(-20 ${cx} 65)`} />)}
                    {[17, 42, 67, 92].map((x, i) => <line key={'s'+i} x1={x} y1="65" x2={x} y2="20" strokeWidth="2" />)}
                    <rect x="16" y="20" width="77" height="6" />
                    <rect x="16" y="30" width="77" height="6" />
                </svg>
            );

            if (fuzzyMatch([0.5, 0.25, 0.25])) return (
                <svg key={key} viewBox="0 0 75 80" className="w-20 h-20 inline-block mx-1 fill-current stroke-current">
                    {[12, 42, 62].map((cx, i) => <ellipse key={'h'+i} cx={cx} cy="65" rx="7" ry="5" transform={`rotate(-20 ${cx} 65)`} />)}
                    {[17, 47, 67].map((x, i) => <line key={'s'+i} x1={x} y1="65" x2={x} y2="20" strokeWidth="2" />)}
                    <rect x="16" y="20" width="52" height="6" />
                    <rect x="46" y="30" width="22" height="6" />
                </svg>
            );

            if (fuzzyMatch([0.25, 0.25, 0.5])) return (
                <svg key={key} viewBox="0 0 75 80" className="w-20 h-20 inline-block mx-1 fill-current stroke-current">
                    {[12, 32, 62].map((cx, i) => <ellipse key={'h'+i} cx={cx} cy="65" rx="7" ry="5" transform={`rotate(-20 ${cx} 65)`} />)}
                    {[17, 37, 67].map((x, i) => <line key={'s'+i} x1={x} y1="65" x2={x} y2="20" strokeWidth="2" />)}
                    <rect x="16" y="20" width="52" height="6" />
                    <rect x="16" y="30" width="22" height="6" />
                </svg>
            );

            if (fuzzyMatch([1/3, 1/3, 1/3])) return (
                <svg key={key} viewBox="0 0 75 80" className="w-20 h-20 inline-block mx-1 fill-current stroke-current">
                    <text x="32" y="15" fontSize="14" fontWeight="bold">3</text>
                    {[12, 37, 62].map((cx, i) => <ellipse key={'h'+i} cx={cx} cy="65" rx="7" ry="5" transform={`rotate(-20 ${cx} 65)`} />)}
                    {[17, 42, 67].map((x, i) => <line key={'s'+i} x1={x} y1="65" x2={x} y2="25" strokeWidth="2" />)}
                    <rect x="16" y="25" width="52" height="6" />
                </svg>
            );

            if (fuzzyMatch([1/6, 1/6, 1/6, 0.5])) return (
                <svg key={key} viewBox="0 0 100 80" className="w-24 h-20 inline-block mx-1 fill-current stroke-current">
                    <text x="37" y="15" fontSize="14" fontWeight="bold">3</text>
                    {[12, 37, 62, 87].map((cx, i) => <ellipse key={'h'+i} cx={cx} cy="65" rx="7" ry="5" transform={`rotate(-20 ${cx} 65)`} />)}
                    {[17, 42, 67, 92].map((x, i) => <line key={'s'+i} x1={x} y1="65" x2={x} y2="25" strokeWidth="2" />)}
                    <rect x="16" y="25" width="77" height="6" />
                    <rect x="16" y="35" width="52" height="6" />
                </svg>
            );

            if (fuzzyMatch([0.5, 1/6, 1/6, 1/6])) return (
                <svg key={key} viewBox="0 0 100 80" className="w-24 h-20 inline-block mx-1 fill-current stroke-current">
                    <text x="62" y="15" fontSize="14" fontWeight="bold">3</text>
                    {[12, 37, 62, 87].map((cx, i) => <ellipse key={'h'+i} cx={cx} cy="65" rx="7" ry="5" transform={`rotate(-20 ${cx} 65)`} />)}
                    {[17, 42, 67, 92].map((x, i) => <line key={'s'+i} x1={x} y1="65" x2={x} y2="25" strokeWidth="2" />)}
                    <rect x="16" y="25" width="77" height="6" />
                    <rect x="41" y="35" width="52" height="6" />
                </svg>
            );

            // Syncopation
            if (fuzzyMatch([0.5, 1.0, 0.5])) return (
                <svg key={key} viewBox="0 0 100 80" className="w-24 h-20 inline-block mx-1 fill-current stroke-current">
                    {[12, 50, 88].map((cx, i) => <ellipse key={'h'+i} cx={cx} cy="65" rx="7" ry="5" transform={`rotate(-20 ${cx} 65)`} />)}
                    {[17, 55, 93].map((x, i) => <line key={'s'+i} x1={x} y1="65" x2={x} y2="20" strokeWidth="2" />)}
                    <rect x="16" y="20" width="77" height="6" />
                </svg>
            );

            // Dotted Quarter & 8th
            if (fuzzyMatch([1.5, 0.5])) return (
                <svg key={key} viewBox="0 0 75 80" className="w-20 h-20 inline-block mx-1 fill-current stroke-current">
                    <ellipse cx="15" cy="65" rx="7" ry="5" transform="rotate(-20 15 65)" />
                    <circle cx="28" cy="60" r="3" />
                    <ellipse cx="55" cy="65" rx="7" ry="5" transform="rotate(-20 55 65)" />
                    <line x1="22" y1="65" x2="22" y2="20" strokeWidth="2" />
                    <line x1="62" y1="65" x2="62" y2="20" strokeWidth="2" />
                    <rect x="21" y="20" width="42" height="6" />
                </svg>
            );

            return <span key={key} className="rhythm-symbol font-bold text-red-500">?</span>;
        };

        const generateMeasure = (difficultyLevel = 0, settings) => {
            const levelIndex = Math.min(9, difficultyLevel);
            const groups = [];
            // Level 9+ gets a grueling 2 measures (8 beats)!
            const totalBeats = levelIndex >= 8 ? 8.0 : 4.0; 
            let remaining = totalBeats;
            
            while(remaining > 0) {
                let availablePatterns = [];
                
                // Filter patterns allowed for this level that also fit in remaining beats
                RHYTHM_DICT.forEach(r => {
                    if (settings[r.id][levelIndex]) {
                        const sum = r.beats.reduce((a, b) => a + b, 0);
                        if (remaining >= sum) {
                            availablePatterns.push(r.beats);
                        }
                    }
                });

                // Failsafe in case user disabled everything or nothing fits the remaining space
                if (availablePatterns.length === 0) {
                    if (remaining >= 1.0) availablePatterns.push([1.0]); // Force a quarter note
                    else availablePatterns.push([0.5, 0.5]); // Force 8th notes
                }

                const p = availablePatterns[Math.floor(Math.random() * availablePatterns.length)];
                groups.push(p);
                
                const sum = p.reduce((a, b) => a + b, 0);
                remaining -= sum;
                remaining = Math.round(remaining * 100) / 100; // Fix JS floating point drift
            }
            return groups;
        };

        const App = () => {
            const [appView, setAppView] = React.useState('title'); // title, setup, game
            
            // Setup & Settings State
            const [teams, setTeams] = React.useState(DEFAULT_TEAMS);
            const [newTeamName, setNewTeamName] = React.useState('');
            const [setupTab, setSetupTab] = React.useState('teams'); // teams, difficulty
            const [rhythmSettings, setRhythmSettings] = React.useState(getSavedSettings());
            
            // Game State
            const [positions, setPositions] = React.useState({});
            const [fails, setFails] = React.useState({});
            const [currentTeamIndex, setCurrentTeamIndex] = React.useState(0);
            const [stealingTeamIndex, setStealingTeamIndex] = React.useState(null);
            const [turnQueue, setTurnQueue] = React.useState([]);
            const [story, setStory] = React.useState("Welcome to Rhythm Quest! The magical Melody Chest awaits the first section to cross the musical realm.");
            const [currentRhythm, setCurrentRhythm] = React.useState([]);
            const [replaysLeft, setReplaysLeft] = React.useState(2);
            // gamePhases: start, playing, steal_selection, judging_steal, gameover
            const [gamePhase, setGamePhase] = React.useState('start'); 
            const [winner, setWinner] = React.useState(null);
            const [audioCtx, setAudioCtx] = React.useState(null);
            const victoryAudio = React.useRef(new Audio('we-are-the-champions-copia.mp3'));

            const generateStoryText = (phase, team, targetTeam = null) => {
                if (phase === 'start') return `The quest begins! It is the ${team.name} section's turn. Listen and count the rhythm to pass!`;
                if (phase === 'pass') return `Glorious! The ${team.name} advanced! Now the ${targetTeam.name} must step up.`;
                if (phase === 'fail') return `Oh no! The ${team.name} stumbled on their rhythm!`;
                if (phase === 'steal_pass') return `What a steal! The ${team.name} snatched a point! Now it's the ${targetTeam.name}'s regular turn.`;
                if (phase === 'steal_fail') return `Disaster! The ${team.name} failed their steal, losing a step and taking double damage! Now it's the ${targetTeam.name}'s regular turn.`;
                if (phase === 'gameover_win') return `Incredible! The ${team.name} have reached the Melody Chest! They are the supreme champions of Rhythm Quest!`;
                if (phase === 'gameover_tpk') return `A tragedy! Every single section has failed too many times. The Melody Chest remains sealed forever!`;
                return "The journey continues...";
            };

            const saveSettings = (newSettings) => {
                setRhythmSettings(newSettings);
                localStorage.setItem('rq_settings', JSON.stringify(newSettings));
            };

            const toggleSetting = (rhythmId, levelIndex) => {
                const newSettings = { ...rhythmSettings };
                newSettings[rhythmId][levelIndex] = !newSettings[rhythmId][levelIndex];
                saveSettings(newSettings);
            };

            const initAudio = () => {
                if (!audioCtx) {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    setAudioCtx(ctx);
                    return ctx;
                }
                return audioCtx;
            };

            const playNote = (ctx, time, duration, isCountIn = false) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (isCountIn) {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(1200, time);
                    osc.frequency.exponentialRampToValueAtTime(100, time + 0.1);

                    gain.gain.setValueAtTime(1, time);
                    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);

                    osc.start(time);
                    osc.stop(time + 0.1);
                } else {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(440, time);

                    const attack = 0.02;
                    const release = Math.min(0.05, duration * 0.2);

                    gain.gain.setValueAtTime(0, time);
                    gain.gain.linearRampToValueAtTime(0.8, time + attack);
                    gain.gain.setValueAtTime(0.8, time + duration - release);
                    gain.gain.linearRampToValueAtTime(0, time + duration);

                    osc.start(time);
                    osc.stop(time + duration);
                }
            };

            const playRhythmAudio = () => {
                if (replaysLeft <= 0 && gamePhase === 'playing') return;
                
                const ctx = initAudio();
                if (ctx.state === 'suspended') ctx.resume();

                const bpm = 75;
                const beatDuration = 60 / bpm;
                let startTime = ctx.currentTime + 0.2;

                // Count in
                for (let i = 0; i < 4; i++) {
                    playNote(ctx, startTime + i * beatDuration, 0, true);
                }

                startTime += 4 * beatDuration;

                // Play rhythm
                let currentOffset = 0;
                const flatRhythm = currentRhythm.flat();
                flatRhythm.forEach(noteDuration => {
                    const durationInSeconds = noteDuration * beatDuration;
                    const articulationGap = Math.min(0.05, durationInSeconds * 0.1); 
                    const playDuration = durationInSeconds - articulationGap;

                    playNote(ctx, startTime + currentOffset * beatDuration, playDuration, false);
                    currentOffset += noteDuration;
                });

                if (gamePhase === 'playing') {
                    setReplaysLeft(prev => prev - 1);
                }
            };

            const handleAddTeam = () => {
                if (newTeamName.trim() && teams.length < 20) {
                    const p = PALETTE[teams.length % PALETTE.length];
                    setTeams([...teams, {
                        id: 'team_' + Date.now(),
                        name: newTeamName.trim(),
                        color: p.c, border: p.b, icon: p.i
                    }]);
                    setNewTeamName('');
                }
            };

            const handleRemoveTeam = (id) => {
                setTeams(teams.filter(t => t.id !== id));
            };

            const getNextAliveTeam = (currentFails, currentQueue) => {
                const activeIndices = teams.map((_, i) => i).filter(i => currentFails[teams[i].id] < MAX_FAILS);
                if (activeIndices.length === 0) return null;

                let nextQueue = currentQueue.filter(i => activeIndices.includes(i));
                if (nextQueue.length === 0) {
                    nextQueue = getShuffledTeams(teams).filter(i => activeIndices.includes(i));
                }
                return { teamIdx: nextQueue[0], newQueue: nextQueue.slice(1) };
            };

            const triggerVictory = (winningTeam) => {
                setWinner(winningTeam);
                setGamePhase('gameover');
                setStory(generateStoryText('gameover_win', winningTeam));
                victoryAudio.current.play().catch(e => console.log("Audio play prevented:", e));
            };

            const startGame = () => {
                initAudio();
                const initialQueue = getShuffledTeams(teams);
                setCurrentTeamIndex(initialQueue[0]);
                setTurnQueue(initialQueue.slice(1));
                
                const initPos = {};
                const initFails = {};
                teams.forEach(t => { initPos[t.id] = 0; initFails[t.id] = 0; });
                setPositions(initPos);
                setFails(initFails);
                
                const initialRhythm = generateMeasure(0, rhythmSettings);
                setCurrentRhythm(initialRhythm);
                setReplaysLeft(2);
                setGamePhase('playing');
                setStory(generateStoryText('start', teams[initialQueue[0]]));
            };

            const handleTurnAdvance = (newPositions, newFails, lastActionStory) => {
                const nextTarget = getNextAliveTeam(newFails, turnQueue);
                
                if (!nextTarget) {
                    setGamePhase('gameover');
                    setWinner(null);
                    setStory(generateStoryText('gameover_tpk'));
                    return;
                }

                setTurnQueue(nextTarget.newQueue);
                setCurrentTeamIndex(nextTarget.teamIdx);
                
                const nextDifficulty = newPositions[teams[nextTarget.teamIdx].id];
                const nextRhythm = generateMeasure(nextDifficulty, rhythmSettings);
                setCurrentRhythm(nextRhythm);
                setReplaysLeft(2);
                setGamePhase('playing');
                setStory(lastActionStory);
            };

            const handleNormalResult = (passed) => {
                const currentTeam = teams[currentTeamIndex];
                let newPositions = { ...positions };
                let newFails = { ...fails };

                if (passed) {
                    newPositions[currentTeam.id] += 1;
                    setPositions(newPositions);
                    if (newPositions[currentTeam.id] >= MAX_STEPS) {
                        triggerVictory(currentTeam);
                        return;
                    }
                    
                    const nextTarget = getNextAliveTeam(newFails, turnQueue);
                    if (nextTarget) {
                        handleTurnAdvance(newPositions, newFails, generateStoryText('pass', currentTeam, teams[nextTarget.teamIdx]));
                    } else {
                        setGamePhase('gameover'); setWinner(null); setStory(generateStoryText('gameover_tpk'));
                    }
                } else {
                    newFails[currentTeam.id] += 1;
                    setFails(newFails);
                    
                    const nextTarget = getNextAliveTeam(newFails, turnQueue);
                    if (!nextTarget) {
                        setGamePhase('gameover');
                        setWinner(null);
                        setStory(generateStoryText('gameover_tpk'));
                        return;
                    }

                    // Go to FREE FOR ALL steal phase
                    setGamePhase('steal_selection');
                }
            };

            const handleStealResult = (stealSuccess) => {
                const stealingTeam = teams[stealingTeamIndex];
                let newPositions = { ...positions };
                let newFails = { ...fails };

                if (stealSuccess) {
                    newPositions[stealingTeam.id] += 1;
                    setPositions(newPositions);
                    
                    if (newPositions[stealingTeam.id] >= MAX_STEPS) {
                        triggerVictory(stealingTeam);
                        return;
                    }
                    
                    const nextTarget = getNextAliveTeam(newFails, turnQueue);
                    handleTurnAdvance(newPositions, newFails, generateStoryText('steal_pass', stealingTeam, teams[nextTarget.teamIdx]));
                } else {
                    // Steal failed! -1 position (min 0), +2 fails!
                    newPositions[stealingTeam.id] = Math.max(0, newPositions[stealingTeam.id] - 1);
                    newFails[stealingTeam.id] += 2;
                    setPositions(newPositions);
                    setFails(newFails);

                    const nextTarget = getNextAliveTeam(newFails, turnQueue);
                    if (!nextTarget) {
                        setGamePhase('gameover'); setWinner(null); setStory(generateStoryText('gameover_tpk'));
                        return;
                    }
                    handleTurnAdvance(newPositions, newFails, generateStoryText('steal_fail', stealingTeam, teams[nextTarget.teamIdx]));
                }
            };

            const renderTrack = () => {
                return (
                    <div className="bg-white p-6 rounded-2xl shadow-lg mb-6 border-4 border-emerald-900">
                        <h2 className="text-2xl font-bold text-center text-emerald-900 mb-6 uppercase tracking-widest">Quest Progress</h2>
                        <div className="space-y-4">
                            {teams.map((team, idx) => {
                                const isEliminated = fails[team.id] >= MAX_FAILS;
                                const isCurrentTurn = currentTeamIndex === idx && gamePhase === 'playing' && !isEliminated;
                                const isStealingTurn = stealingTeamIndex === idx && gamePhase === 'judging_steal' && !isEliminated;
                                
                                return (
                                <div key={team.id} className={`relative transition-opacity duration-500 ${isEliminated ? 'opacity-40 grayscale' : 'opacity-100'}`}>
                                    <div className="flex items-center mb-1">
                                        <div className={`w-40 font-bold flex flex-col justify-center ${isCurrentTurn ? 'text-emerald-700' : isStealingTurn ? 'text-amber-600' : 'text-gray-600'}`}>
                                            <div className={`text-lg flex items-center ${(isCurrentTurn || isStealingTurn) ? 'text-xl' : ''}`}>
                                                {isCurrentTurn && <i className="fa-solid fa-caret-right mr-2 text-emerald-500 animate-pulse"></i>}
                                                {isStealingTurn && <i className="fa-solid fa-mask mr-2 text-amber-500 animate-bounce"></i>}
                                                {team.name}
                                                <span className="ml-2 text-xs bg-gray-200 px-2 py-1 rounded-md">Lvl {Math.min(9, (positions[team.id] || 0) + 1)}</span>
                                            </div>
                                            <div className="flex text-red-500 text-xs mt-1">
                                                {[...Array(MAX_FAILS)].map((_, i) => (
                                                    <i key={i} className={`fa-solid fa-xmark mr-1 ${i < fails[team.id] ? 'opacity-100' : 'opacity-20 text-gray-400'}`}></i>
                                                ))}
                                            </div>
                                            {isEliminated && <div className="text-red-700 text-xs font-black uppercase mt-1">Eliminated!</div>}
                                        </div>
                                        <div className="flex-1 h-12 bg-gray-200 rounded-full relative track-bg border-2 border-gray-300 overflow-hidden ml-2">
                                            <div className="absolute right-0 top-0 bottom-0 w-8 bg-yellow-400 border-l-4 border-yellow-600 flex items-center justify-center z-10">
                                                <i className="fa-solid fa-gem text-white text-xs"></i>
                                            </div>
                                            
                                            <div 
                                                className={`absolute top-0 bottom-0 transition-all duration-700 ease-in-out flex items-center justify-center z-20`}
                                                style={{ left: `${((positions[team.id] || 0) / MAX_STEPS) * 92}%`, width: '8%' }}
                                            >
                                                <div className={`w-10 h-10 ${team.color} ${team.border} border-2 rounded-full flex items-center justify-center shadow-md ${isCurrentTurn ? 'transform scale-125 ring-4 ring-emerald-300' : isStealingTurn ? 'transform scale-125 ring-4 ring-amber-400' : ''}`}>
                                                    <i className={`fa-solid ${team.icon} text-white`}></i>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            if (appView === 'title') {
                return (
                    <div className="min-h-screen bg-emerald-950 p-4 flex items-center justify-center relative overflow-hidden">
                        <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-emerald-800 rounded-full opacity-50 blur-3xl"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-teal-800 rounded-full opacity-50 blur-3xl"></div>
                        
                        <div className="bg-white p-10 md:p-14 rounded-3xl shadow-2xl max-w-xl w-full text-center border-4 border-emerald-500 relative z-10 transform transition-all hover:scale-[1.01]">
                            <h1 className="text-5xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-600 to-teal-500 mb-2 drop-shadow-sm">
                                Mr.A's Rhythm Quest
                            </h1>
                            <div className="text-gray-500 font-bold tracking-widest uppercase mb-6 text-xl flex items-center justify-center gap-3">
                                <span className="h-px w-8 bg-gray-300"></span>
                                Version 3.0
                                <span className="h-px w-8 bg-gray-300"></span>
                            </div>
                            
                            <div className="mb-8 text-center bg-blue-50 p-6 rounded-xl border border-blue-200">
                                <p className="text-blue-800 font-bold mb-2 text-lg"><i className="fa-solid fa-bolt mr-2"></i> Offline Mode Active</p>
                                <p className="text-blue-700 text-sm">The game now runs fully locally for perfect, instantaneous rhythm generation! The AI DM has retired.</p>
                            </div>

                            <div className="flex flex-col gap-4">
                                <button 
                                    onClick={() => setAppView('setup')}
                                    className={`px-8 py-5 rounded-2xl font-black text-2xl shadow-xl transition-all bg-gradient-to-r from-emerald-500 to-teal-500 text-white hover:scale-105 hover:shadow-2xl`}
                                >
                                    Setup Game <i className="fa-solid fa-gears ml-2"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (appView === 'setup') {
                return (
                    <div className="min-h-screen bg-emerald-950 p-4 md:p-8 flex flex-col items-center relative overflow-hidden">
                        <div className="w-full max-w-4xl bg-white p-8 md:p-10 rounded-3xl shadow-2xl relative z-10 border-4 border-emerald-500">
                            <button onClick={() => setAppView('title')} className="absolute left-6 top-6 text-gray-400 hover:text-emerald-600 transition-colors" title="Back to Title">
                                <i className="fa-solid fa-arrow-left text-2xl"></i>
                            </button>
                            <h2 className="text-4xl font-black text-center text-emerald-800 mb-6 mt-2"><i className="fa-solid fa-wrench mr-4"></i>Game Setup</h2>
                            
                            <div className="flex justify-center mb-6 border-b-2 border-emerald-100 pb-4">
                                <button onClick={() => setSetupTab('teams')} className={`px-6 py-2 mx-2 font-bold rounded-full transition-colors ${setupTab === 'teams' ? 'bg-emerald-600 text-white shadow-md' : 'bg-gray-200 text-gray-600 hover:bg-gray-300'}`}>
                                    <i className="fa-solid fa-users mr-2"></i> Roster
                                </button>
                                <button onClick={() => setSetupTab('difficulty')} className={`px-6 py-2 mx-2 font-bold rounded-full transition-colors ${setupTab === 'difficulty' ? 'bg-emerald-600 text-white shadow-md' : 'bg-gray-200 text-gray-600 hover:bg-gray-300'}`}>
                                    <i className="fa-solid fa-sliders mr-2"></i> Difficulty Editor
                                </button>
                            </div>

                            {setupTab === 'teams' && (
                                <div>
                                    <div className="bg-gray-50 p-6 rounded-xl border border-gray-200 mb-6 flex flex-col md:flex-row gap-4 items-center">
                                        <input 
                                            type="text" 
                                            value={newTeamName} 
                                            onChange={(e) => setNewTeamName(e.target.value)}
                                            onKeyDown={(e) => e.key === 'Enter' && handleAddTeam()}
                                            className="flex-1 px-5 py-4 rounded-xl border-2 border-gray-300 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100 focus:outline-none text-lg"
                                            placeholder="Enter Team Name (e.g., Alto Saxes)"
                                            maxLength={25}
                                        />
                                        <button 
                                            onClick={handleAddTeam}
                                            disabled={!newTeamName.trim() || teams.length >= 20}
                                            className={`px-8 py-4 rounded-xl font-bold text-lg text-white shadow transition-transform ${(!newTeamName.trim() || teams.length >= 20) ? 'bg-gray-400 cursor-not-allowed' : 'bg-emerald-600 hover:bg-emerald-700 hover:scale-105'}`}
                                        >
                                            <i className="fa-solid fa-plus mr-2"></i> Add Team
                                        </button>
                                    </div>

                                    <div className="mb-4 flex justify-between items-center px-2">
                                        <span className="font-bold text-gray-600">Active Teams: {teams.length}/20</span>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-8 max-h-80 overflow-y-auto p-2">
                                        {teams.map((t, idx) => (
                                            <div key={t.id} className={`${t.color} text-white p-3 rounded-xl shadow flex justify-between items-center`}>
                                                <div className="font-bold text-lg flex items-center">
                                                    <i className={`fa-solid ${t.icon} mr-3 opacity-75`}></i>
                                                    {t.name}
                                                </div>
                                                <button onClick={() => handleRemoveTeam(t.id)} className="text-white hover:text-red-200 transition-colors p-2">
                                                    <i className="fa-solid fa-trash"></i>
                                                </button>
                                            </div>
                                        ))}
                                        {teams.length === 0 && (
                                            <div className="col-span-full text-center text-gray-500 font-medium py-8 italic">No teams added yet. You need at least 2 teams to play.</div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {setupTab === 'difficulty' && (
                                <div className="mb-8">
                                    <div className="bg-blue-50 text-blue-800 p-4 rounded-lg mb-4 text-sm font-semibold border border-blue-200">
                                        <i className="fa-solid fa-info-circle mr-2"></i> Toggle which rhythms can appear at each Level (1-10). Changes save automatically!
                                    </div>
                                    <div className="overflow-x-auto border-2 border-gray-200 rounded-xl shadow-inner max-h-96">
                                        <table className="w-full text-left border-collapse">
                                            <thead className="bg-gray-100 sticky top-0 z-10 shadow-sm">
                                                <tr>
                                                    <th className="p-3 border-b-2 border-gray-300 font-bold text-gray-700 whitespace-nowrap">Rhythm Type</th>
                                                    {[...Array(10)].map((_, i) => (
                                                        <th key={i} className="p-3 border-b-2 border-gray-300 text-center font-bold text-emerald-700">Lvl {i+1}</th>
                                                    ))}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {RHYTHM_DICT.map((r, rowIndex) => (
                                                    <tr key={r.id} className={rowIndex % 2 === 0 ? 'bg-white' : 'bg-gray-50'}>
                                                        <td className="p-3 border-b border-gray-200 font-semibold text-gray-800 whitespace-nowrap">{r.name}</td>
                                                        {[...Array(10)].map((_, levelIndex) => (
                                                            <td key={levelIndex} className="p-3 border-b border-gray-200 text-center">
                                                                <input 
                                                                    type="checkbox" 
                                                                    checked={rhythmSettings[r.id][levelIndex]}
                                                                    onChange={() => toggleSetting(r.id, levelIndex)}
                                                                    className="w-5 h-5 text-emerald-600 rounded focus:ring-emerald-500 cursor-pointer"
                                                                />
                                                            </td>
                                                        ))}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            <button 
                                onClick={() => { setAppView('game'); startGame(); }}
                                disabled={teams.length < 2}
                                className={`w-full py-5 rounded-2xl font-black text-2xl shadow-xl transition-all ${teams.length < 2 ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-gradient-to-r from-emerald-500 to-teal-500 text-white hover:scale-105 hover:shadow-2xl'}`}
                            >
                                Enter the Quest! <i className="fa-solid fa-dragon ml-2"></i>
                            </button>
                        </div>
                    </div>
                )
            }

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-5xl mx-auto flex flex-col">
                    <header className="text-center mb-8 relative">
                        <button onClick={() => setAppView('setup')} className="absolute left-0 top-0 text-gray-500 hover:text-emerald-600 transition-colors" title="Back to Setup">
                            <i className="fa-solid fa-arrow-left text-2xl"></i>
                        </button>
                        <h1 className="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-600 to-teal-500 drop-shadow-sm mb-2">
                            <i className="fa-solid fa-music mr-4 text-emerald-600"></i>
                            Rhythm Quest
                            <i className="fa-solid fa-scroll ml-4 text-teal-500"></i>
                        </h1>
                        <p className="text-gray-600 font-medium">A Musical Adventure for Band Sections</p>
                    </header>

                    {renderTrack()}

                    <div className="bg-white rounded-2xl shadow-xl overflow-hidden border-2 border-gray-100 flex-1 flex flex-col">
                        <div className="bg-emerald-900 p-4 text-white flex justify-between items-center">
                            <div className="font-bold text-xl flex items-center">
                                <i className="fa-solid fa-scroll mr-3 text-emerald-300"></i>
                                Encounter Log
                            </div>
                            {gamePhase !== 'start' && gamePhase !== 'gameover' && (
                                <div className={`px-4 py-1 rounded-full font-semibold border ${gamePhase.includes('steal') ? 'bg-amber-800 text-amber-200 border-amber-600' : 'bg-emerald-800 text-emerald-200 border-emerald-600'}`}>
                                    {gamePhase.includes('steal') ? (
                                        <>Steal Opportunity!</>
                                    ) : (
                                        <>Current Turn: {teams[currentTeamIndex].name} (Lvl {Math.min(9, (positions[teams[currentTeamIndex].id] || 0) + 1)})</>
                                    )}
                                </div>
                            )}
                        </div>
                        
                        <div className="p-8 flex-1 flex flex-col items-center justify-center text-center">
                            <p className="text-2xl font-serif text-gray-800 leading-relaxed mb-8 italic">"{story}"</p>

                            {gamePhase === 'start' && (
                                <button onClick={startGame} className="mt-4 px-10 py-4 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold rounded-full text-2xl shadow-lg transform transition hover:scale-105">
                                    Start Quest
                                </button>
                            )}

                            {gamePhase === 'gameover' && (
                                <div className="mt-8 animate-bounce">
                                    {winner ? (
                                        <h2 className="text-4xl font-black text-yellow-500 mb-4">
                                            <i className="fa-solid fa-trophy mr-4"></i>
                                            {winner.name} WIN!
                                            <i className="fa-solid fa-trophy ml-4"></i>
                                        </h2>
                                    ) : (
                                        <h2 className="text-4xl font-black text-red-600 mb-4">
                                            <i className="fa-solid fa-skull mr-4"></i>
                                            ALL PARTIES DEFEATED!
                                            <i className="fa-solid fa-skull ml-4"></i>
                                        </h2>
                                    )}
                                    <button onClick={() => { victoryAudio.current.pause(); victoryAudio.current.currentTime = 0; setAppView('setup'); }} className="px-6 py-3 bg-gray-800 hover:bg-gray-900 text-white font-bold rounded-full mt-4">
                                        Back to Setup
                                    </button>
                                </div>
                            )}

                            {(gamePhase === 'playing' || gamePhase === 'steal_selection' || gamePhase === 'judging_steal') && (
                                <div className="w-full max-w-4xl bg-gray-50 p-6 rounded-xl border-2 border-dashed border-gray-300">
                                    
                                    <div className="my-4 bg-white p-6 rounded-xl border border-gray-300 shadow-md">
                                        <div className="text-emerald-700 font-black mb-4 uppercase tracking-widest text-lg">Current Rhythm (4/4 Time)</div>
                                        <div className="flex flex-wrap justify-center items-end min-h-[6rem] gap-y-8 text-gray-900">
                                            {currentRhythm.map((group, i) => renderRhythmGroup(group, i))}
                                        </div>
                                    </div>

                                    {(gamePhase === 'playing' || gamePhase === 'judging_steal') && (
                                        <div className="flex flex-col gap-6 justify-center items-center mt-8 pt-6 border-t-2 border-gray-200">
                                            <button 
                                                onClick={playRhythmAudio}
                                                disabled={replaysLeft <= 0}
                                                className={`flex items-center px-8 py-4 rounded-xl font-bold text-xl text-white shadow-md transition-all ${replaysLeft > 0 ? 'bg-indigo-500 hover:bg-indigo-600 transform hover:-translate-y-1' : 'bg-gray-400 cursor-not-allowed'}`}
                                            >
                                                <i className="fa-solid fa-volume-high mr-3 text-2xl"></i>
                                                Play Audio ({replaysLeft} Replays Left)
                                            </button>

                                            <div className="w-full mt-4">
                                                <p className="text-gray-700 font-bold mb-4 text-xl">Did the <span className="text-emerald-600">{gamePhase === 'playing' ? teams[currentTeamIndex].name : teams[stealingTeamIndex].name}</span> count it correctly out loud?</p>
                                                <div className="flex gap-6 justify-center">
                                                    <button onClick={() => gamePhase === 'playing' ? handleNormalResult(true) : handleStealResult(true)} className="px-10 py-4 bg-green-500 hover:bg-green-600 text-white font-bold rounded-xl shadow-lg flex items-center text-2xl transform hover:scale-105 transition-transform">
                                                        <i className="fa-solid fa-check-circle mr-3"></i> Pass
                                                    </button>
                                                    <button onClick={() => gamePhase === 'playing' ? handleNormalResult(false) : handleStealResult(false)} className="px-10 py-4 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl shadow-lg flex items-center text-2xl transform hover:scale-105 transition-transform">
                                                        <i className="fa-solid fa-times-circle mr-3"></i> Fail
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {gamePhase === 'steal_selection' && (
                                        <div className="border-t-4 border-amber-300 bg-amber-50 p-6 rounded-xl mt-6 shadow-inner">
                                            <p className="text-amber-800 font-black mb-2 text-2xl"><i className="fa-solid fa-mask mr-2"></i> FREE FOR ALL STEAL!</p>
                                            <p className="text-amber-700 mb-6 font-bold text-lg">The {teams[currentTeamIndex].name} failed! Who shouted first to steal the point?</p>
                                            <div className="flex flex-wrap gap-4 justify-center">
                                                {teams.map((t, idx) => {
                                                    // Don't let the team who failed steal their own miss, and don't show eliminated teams
                                                    if (idx === currentTeamIndex || fails[t.id] >= MAX_FAILS) return null;
                                                    return (
                                                        <button 
                                                            key={t.id} 
                                                            onClick={() => { setStealingTeamIndex(idx); setGamePhase('judging_steal'); }} 
                                                            className={`px-6 py-4 ${t.color} text-white font-bold rounded-xl shadow-lg transform hover:scale-105 transition-all flex items-center text-xl`}
                                                        >
                                                            <i className={`fa-solid ${t.icon} mr-3 opacity-70`}></i> {t.name}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                            <div className="mt-8 flex justify-center">
                                                <button onClick={() => {
                                                    const nextTarget = getNextAliveTeam(fails, turnQueue);
                                                    handleTurnAdvance(positions, fails, `Nobody stole the point! Now it's the ${teams[nextTarget.teamIdx].name}'s regular turn.`);
                                                }} className="px-8 py-3 bg-gray-500 hover:bg-gray-600 text-white font-bold rounded-xl shadow transition-colors text-lg">
                                                    No one (Skip Steal)
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
